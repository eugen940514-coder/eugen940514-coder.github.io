<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計分系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icon Components (替代 lucide-react) ---
    const _icon = (paths, props = {}) => {
      const { className = '', ...rest } = props;
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg', width: 24, height: 24,
        viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor',
        strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
        className, ...rest
      }, ...paths.map((d, i) => typeof d === 'string'
        ? React.createElement('path', { key: i, d })
        : React.createElement(d.tag, { key: i, ...d })
      ));
    };
    const Play = (p) => _icon(['M5 3l14 9-14 9V3z'], p);
    const Plus = (p) => _icon(['M12 5v14', 'M5 12h14'], p);
    const Users = (p) => _icon([{tag:'path',d:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2'},{tag:'circle',cx:'9',cy:'7',r:'4'},{tag:'path',d:'M23 21v-2a4 4 0 0 0-3-3.87'},{tag:'path',d:'M16 3.13a4 4 0 0 1 0 7.75'}], p);
    const BarChart2 = (p) => _icon([{tag:'line',x1:'18',y1:'20',x2:'18',y2:'10'},{tag:'line',x1:'12',y1:'20',x2:'12',y2:'4'},{tag:'line',x1:'6',y1:'20',x2:'6',y2:'14'}], p);
    const History = (p) => _icon([{tag:'path',d:'M3 3v5h5'},{tag:'path',d:'M3.05 13A9 9 0 1 0 6 5.3L3 8'}], p);
    const CheckCircle = (p) => _icon(['M22 11.08V12a10 10 0 1 1-5.93-9.14', 'M22 4L12 14.01l-3-3'], p);
    const XCircle = (p) => _icon([{tag:'circle',cx:'12',cy:'12',r:'10'},'M15 9l-6 6','M9 9l6 6'], p);
    const ArrowRight = (p) => _icon(['M5 12h14', 'M12 5l7 7-7 7'], p);
    const RotateCcw = (p) => _icon([{tag:'path',d:'M1 4v6h6'},{tag:'path',d:'M3.51 15a9 9 0 1 0 2.13-9.36L1 10'}], p);
    const ShieldAlert = (p) => _icon(['M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',{tag:'line',x1:'12',y1:'8',x2:'12',y2:'12'},{tag:'line',x1:'12',y1:'16',x2:'12.01',y2:'16'}], p);
    const Zap = (p) => _icon(['M13 2L3 14h9l-1 8 10-12h-9l1-8'], p);
    const Edit2 = (p) => _icon(['M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z'], p);
    const Trash2 = (p) => _icon(['M3 6h18','M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',{tag:'line',x1:'10',y1:'11',x2:'10',y2:'17'},{tag:'line',x1:'14',y1:'11',x2:'14',y2:'17'}], p);
    const Save = (p) => _icon(['M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z',{tag:'polyline',points:'17 21 17 13 7 13 7 21'},{tag:'polyline',points:'7 3 7 8 15 8'}], p);
    const X = (p) => _icon(['M18 6L6 18', 'M6 6l12 12'], p);
    const SaveAll = (p) => _icon(['M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z',{tag:'polyline',points:'17 21 17 13 7 13 7 21'},{tag:'polyline',points:'7 3 7 8 15 8'}], p);
    const Trophy = (p) => _icon(['M6 9H4.5a2.5 2.5 0 0 1 0-5H6','M18 9h1.5a2.5 2.5 0 0 0 0-5H18','M4 22h16','M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22','M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22','M18 2H6v7a6 6 0 0 0 12 0V2z'], p);
    const FileText = (p) => _icon(['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z',{tag:'polyline',points:'14 2 14 8 20 8'},{tag:'line',x1:'16',y1:'13',x2:'8',y2:'13'},{tag:'line',x1:'16',y1:'17',x2:'8',y2:'17'},{tag:'polyline',points:'10 9 9 9 8 9'}], p);
    const Activity = (p) => _icon([{tag:'polyline',points:'22 12 18 12 15 21 9 3 6 12 2 12'}], p);
    const Target = (p) => _icon([{tag:'circle',cx:'12',cy:'12',r:'10'},{tag:'circle',cx:'12',cy:'12',r:'6'},{tag:'circle',cx:'12',cy:'12',r:'2'}], p);
    const Repeat = (p) => _icon([{tag:'polyline',points:'17 1 21 5 17 9'},'M3 11V9a4 4 0 0 1 4-4h14',{tag:'polyline',points:'7 23 3 19 7 15'},'M21 13v2a4 4 0 0 1-4 4H3'], p);
    const ArrowLeft = (p) => _icon(['M19 12H5', 'M12 19l-7-7 7-7'], p);
    const Download = (p) => _icon(['M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4',{tag:'polyline',points:'7 10 12 15 17 10'},'M12 15V3'], p);
    const Upload = (p) => _icon(['M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4',{tag:'polyline',points:'17 8 12 3 7 8'},'M12 3v12'], p);
    const Shield = (p) => _icon(['M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'], p);

    // --- 初始資料與常數 ---
    const initialRoster = [
      { id: 1, name: '蔡唯義', number: 1, positions: ['S'], grade: '大一', height: '175cm', hand: '右手' },
      { id: 2, name: '黃俞傑', number: 2, positions: ['OH'], grade: '大二', height: '180cm', hand: '右手' },
      { id: 3, name: '江上宇', number: 3, positions: ['MB'], grade: '大三', height: '185cm', hand: '右手' },
      { id: 4, name: '柯宏諭', number: 4, positions: ['OPP'], grade: '大四', height: '180cm', hand: '右手' },
      { id: 5, name: '吳秦宇', number: 5, positions: ['OH'], grade: '碩一', height: '180cm', hand: '右手' },
      { id: 6, name: '侯易宏', number: 6, positions: ['MB'], grade: '碩二', height: '185cm', hand: '右手' },
      { id: 7, name: '洪雅賢', number: 7, positions: ['L'], grade: '碩三', height: '170cm', hand: '右手' },
      { id: 8, name: '蔡澄浩', number: 8, positions: ['OPP'], grade: '大一', height: '180cm', hand: '右手' },
    ];

    const positionOptions = ['OH', 'MB', 'OPP', 'S', 'L'];

    const blockQualityOptions = [
      { id: 'perfect', label: '1. 攔網位置、手型到位' },
      { id: 'bad_pos', label: '2. 位置不到位' },
      { id: 'bad_hand', label: '3. 手型不到位' }
    ];

    const attackOptions = [
      { id: 'kill', label: '得分 (Kill)', type: 'good', point: 'us', value: 3 },
      { id: 'in_play', label: '被防起/接續', type: 'neutral', value: 2 },
      { id: 'blocked_rebound', label: '被攔回 (我方再攻)', type: 'neutral', value: 1 },
      { id: 'blocked_dead', label: '被攔死 (失分)', type: 'bad', point: 'them', value: 0 },
      { id: 'error', label: '出界/掛網', type: 'bad', point: 'them', value: 0 }
    ];

    const actionTypes = {
      Serve: {
        label: '發球', options: [{ id: 'ace', label: '得分 (Ace)', type: 'good', point: 'us', value: 3 }, {
          id: 'in', label:
            '破壞/一般', type: 'neutral', value: 2
        }, { id: 'error', label: '失誤', type: 'bad', point: 'them', value: 0 }]
      },
      Receive: {
        label: '接發球', options: [{ id: 'perfect', label: '到位', type: 'neutral', value: 3 }, {
          id: 'good', label: '半到位',
          type: 'neutral', value: 2
        }, { id: 'bad', label: '不到位', type: 'neutral', value: 1 }, {
          id: 'kill', label: '接發過網得分', type:
            'good', point: 'us', value: 3
        }, { id: 'overpass', label: '噴飛過網', type: 'bad', value: 0 }, {
          id: 'error', label:
            '直接失誤', type: 'bad', point: 'them', value: 0
        }]
      },
      Set: {
        label: '舉球', options: [{ id: 'perfect', label: '到位', type: 'neutral', value: 3 }, {
          id: 'good', label: '半到位', type:
            'neutral', value: 2
        }, { id: 'bad', label: '不到位', type: 'neutral', value: 1 }, {
          id: 'kill', label: '舉過網得分', type: 'good', point: 'us', value: 3
        }, {
          id: 'set_overpass', label: '舉過網', type: 'neutral', value: 1
        }, {
          id: 'error', label: '連擊/持球/失誤', type:
            'bad', point: 'them', value: 0
        }]
      },
      Attack: { label: '攻擊', options: attackOptions },
      BackRowAttack: { label: '後排攻擊', options: attackOptions },
      Freeball: {
        label: '送球', options: [{ id: 'success', label: '順利送過', type: 'neutral', value: 2 }, {
          id: 'error', label:
            '送球失誤/出界', type: 'bad', point: 'them', value: 0
        }]
      },
      Block: {
        label: '攔網', options: [{ id: 'stuff', label: '攔死得分', type: 'good', point: 'us', value: 3 }, {
          id: 'touch_out',
          label: '打手出界 / 吞下去 (失分)', type: 'bad', point: 'them', value: 0
        }, {
          id: 'rebound_to_opponent', label: '攔回(對手再攻)', type:
            'neutral', value: 1
        }, { id: 'touch', label: '有效觸球', type: 'neutral', value: 2 }, {
          id: 'no_touch', label: '無觸球',
          type: 'neutral', value: 1
        }, { id: 'error', label: '觸網/越位', type: 'bad', point: 'them', value: 0 }]
      },
      Dig: {
        label: '防守', options: [{ id: 'perfect', label: '到位', type: 'neutral', value: 3 }, {
          id: 'good', label: '半到位', type:
            'neutral', value: 2
        }, { id: 'bad', label: '不到位', type: 'neutral', value: 1 }, {
          id: 'overpass', label: '噴飛過網', type:
            'neutral', value: 1
        }, { id: 'error', label: '失誤(噴飛/未觸球)', type: 'bad', point: 'them', value: 0 }, {
          id: 'no_defense_zone',
          label: '空檔落地(不計個人失誤)', type: 'bad', point: 'them', value: 0
        }]
      },
    };

    const getActionCategoryLabel = (category) => {
      if (category === 'opponent') return '對手回球';
      if (category === 'system') return '系統狀態';
      return actionTypes[category]?.label || category;
    };

    const getAcademicYearFromDate = (dateStr) => {
      try {
        let date;
        if (!dateStr) date = new Date();
        else {
          const normalized = dateStr.replace(/\//g, '-');
          date = new Date(normalized);
        }
        if (isNaN(date.getTime())) date = new Date();
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const ay = month >= 9 ? (year - 1911) : (year - 1911 - 1);
        return String(ay);
      } catch (e) {
        return "114";
      }
    };

    const getBackupFilename = (prefix = "volleyball_full_backup") => {
      const now = new Date();
      const YYYY = now.getFullYear();
      const MM = String(now.getMonth() + 1).padStart(2, '0');
      const DD = String(now.getDate()).padStart(2, '0');
      const HH = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      return `${prefix}_${YYYY}/${MM}/${DD}/${HH}:${mm}.json`;
    };

    // 陣型預設分配邏輯
    const applyStandardPreset = (serveTeam, currentRoster) => {
      if (!currentRoster || !Array.isArray(currentRoster)) return {
        p1: '', p2: '', p3: '', p4: '', p5: '', p6: '', l1: '',
        b1: '', b2: '', b3: '', b4: '', b5: ''
      };

      const s = currentRoster.find(r => r.positions.includes('S'))?.id?.toString() || '';
      const ohs = currentRoster.filter(r => r.positions.includes('OH'));
      const mbs = currentRoster.filter(r => r.positions.includes('MB'));
      const opp = currentRoster.find(r => r.positions.includes('OPP'))?.id?.toString() || '';
      const l1 = currentRoster.find(r => r.positions.includes('L'))?.id?.toString() || '';

      if (serveTeam === 'us') {
        return {
          p1: s, p2: ohs[0]?.id?.toString() || '', p3: mbs[0]?.id?.toString() || '', p4: opp, p5: ohs[1]?.id?.toString()
            || '', p6: mbs[1]?.id?.toString() || '', l1: l1, b1: '', b2: '', b3: '', b4: '', b5: ''
        };
      } else {
        return {
          p1: mbs[1]?.id?.toString() || '', p2: s, p3: ohs[0]?.id?.toString() || '', p4: mbs[0]?.id?.toString() || '',
          p5: opp, p6: ohs[1]?.id?.toString() || '', l1: l1, b1: '', b2: '', b3: '', b4: '', b5: ''
        };
      }
    };

    // 強化版 LocalStorage Hook
    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        try {
          const stickyValue = window.localStorage.getItem(key);
          if (stickyValue === null || stickyValue === "undefined") return defaultValue;
          const parsed = JSON.parse(stickyValue);
          return parsed !== null ? parsed : defaultValue;
        } catch (e) {
          return defaultValue;
        }
      });
      useEffect(() => {
        try {
          if (value === undefined) {
            window.localStorage.removeItem(key);
          } else {
            window.localStorage.setItem(key, JSON.stringify(value));
          }
        } catch (e) { }
      }, [key, value]);
      return [value, setValue];
    }

    // --- 數據圖表元件 ---
    const ScoreProgressionChart = ({ spd, history }) => {
      const [hoveredIdx, setHoveredIdx] = React.useState(null);
      const pts = spd.points;
      if (pts.length <= 1) return <p className="text-sm text-slate-400 text-center py-4">無資料</p>;

      const maxScore = Math.max(...pts.map(p => Math.max(p.us, p.them)), 5);
      const yMax = Math.ceil(maxScore / 5) * 5 + 2;
      const W = 600, H = 260, padL = 40, padR = 40, padT = 30, padB = 30;
      const cW = W - padL - padR, cH = H - padT - padB;
      const xStep = pts.length > 1 ? cW / (pts.length - 1) : cW;
      const toX = (i) => padL + i * xStep;
      const toY = (v) => padT + cH - (v / yMax) * cH;

      const usLine = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.us).toFixed(1)}`).join(' ');
      const themLine = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.them).toFixed(1)}`).join(' ');

      const gridLines = [];
      for (let v = 0; v <= yMax; v += 5) gridLines.push(v);

      const timeoutMarkers = [];
      let rallyIdx = 0;
      const setRallies = history.filter(r => r.setNum === spd.setNum);
      setRallies.forEach((r) => {
        rallyIdx++;
        (r.actions || []).forEach(a => {
          if (a.actionCategory === 'system' && a.result?.id?.includes('暫停')) {
            timeoutMarkers.push({ idx: rallyIdx, label: '暫停' });
          }
        });
      });

      const handleInteraction = (e) => {
        const svg = e.currentTarget;
        const rect = svg.getBoundingClientRect();
        
        // 支援觸控與滑鼠事件
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const mouseX = clientX - rect.left;
        const mousePct = Math.max(0, Math.min(1, mouseX / rect.width));
        const chartX = mousePct * W;
        
        const relativeX = chartX - padL;
        const idx = Math.round(relativeX / xStep);
        
        if (idx >= 0 && idx < pts.length) {
          setHoveredIdx(idx);
        } else {
          setHoveredIdx(null);
        }
      };

      return (
        <div className="relative touch-none">
          <svg
            viewBox={`0 0 ${W} ${H}`}
            preserveAspectRatio="xMidYMid meet"
            className="w-full h-auto cursor-crosshair select-none"
            style={{ maxHeight: '300px' }}
            onMouseMove={handleInteraction}
            onTouchMove={handleInteraction}
            onMouseLeave={() => setHoveredIdx(null)}
            onTouchEnd={() => setHoveredIdx(null)}
          >
            {gridLines.map(v => (
              <React.Fragment key={v}>
                <line x1={padL} y1={toY(v)} x2={W - padR} y2={toY(v)} stroke="#e2e8f0" strokeWidth="1" />
                <text x={padL - 8} y={toY(v) + 4} textAnchor="end" fill="#94a3b8" fontSize="11" fontWeight="500">{v}</text>
              </React.Fragment>
            ))}
            {timeoutMarkers.map((tm, i) => (
              <React.Fragment key={`to-${i}`}>
                <line x1={toX(tm.idx)} y1={padT} x2={toX(tm.idx)} y2={H - padB} stroke="#b45309" strokeWidth="1.5" strokeDasharray="6 4" opacity="0.4" />
                <text x={toX(tm.idx)} y={padT - 6} textAnchor="middle" fill="#b45309" fontSize="10" fontWeight="700" opacity="0.6">{tm.label}</text>
              </React.Fragment>
            ))}
            <path d={themLine} fill="none" stroke="#ef4444" strokeWidth="2" strokeDasharray="6 4" strokeLinecap="round" opacity="0.7" />
            <path d={usLine} fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" />
            
            {hoveredIdx !== null && (
              <React.Fragment>
                <line x1={toX(hoveredIdx)} y1={padT} x2={toX(hoveredIdx)} y2={H - padB} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4 2" />
                <circle cx={toX(hoveredIdx)} cy={toY(pts[hoveredIdx].us)} r="4" fill="#16a34a" stroke="white" strokeWidth="2" />
                <circle cx={toX(hoveredIdx)} cy={toY(pts[hoveredIdx].them)} r="4" fill="#ef4444" stroke="white" strokeWidth="2" />
              </React.Fragment>
            )}

            <text x={W - padR + 8} y={toY(pts[pts.length - 1].us) + 4} fill="#16a34a" fontSize="12" fontWeight="800">我方</text>
            <text x={W - padR + 8} y={toY(pts[pts.length - 1].them) + 4} fill="#ef4444" fontSize="12" fontWeight="800">對方</text>
          </svg>
          
          {hoveredIdx !== null && (
            <div
              className="absolute pointer-events-none bg-white/95 backdrop-blur-sm border border-slate-200 rounded-lg shadow-xl p-2.5 text-xs z-[100] flex flex-col gap-1.5 ring-1 ring-slate-900/5 shadow-indigo-100"
              style={{
                left: `${(toX(hoveredIdx) / W) * 100}%`,
                top: '50%',
                transform: `translate(15px, -50%)`
              }}
            >
              <div className="font-black text-slate-500 border-b border-slate-100 pb-1 mb-0.5">第 {hoveredIdx} 回合</div>
              <div className="flex items-center justify-between gap-6">
                <span className="flex items-center text-emerald-600 font-bold"><span className="w-2 h-2 rounded-full bg-emerald-500 mr-1.5"></span>我方</span>
                <span className="font-mono text-lg">{pts[hoveredIdx].us}</span>
              </div>
              <div className="flex items-center justify-between gap-6">
                <span className="flex items-center text-rose-500 font-bold"><span className="w-2 h-2 rounded-full bg-rose-500 mr-1.5"></span>對方</span>
                <span className="font-mono text-lg">{pts[hoveredIdx].them}</span>
              </div>
            </div>
          )}

          {/* ⚡ 新增：盤勢分析指標 */}
          {(() => {
            let leadCount = 0, trailCount = 0, tieCount = 0;
            let leadChanges = 0;
            let currentLeader = null;

            pts.forEach((p) => {
              if (p.us > p.them) {
                leadCount++;
                if (currentLeader === 'them') leadChanges++;
                currentLeader = 'us';
              } else if (p.them > p.us) {
                trailCount++;
                if (currentLeader === 'us') leadChanges++;
                currentLeader = 'them';
              } else {
                tieCount++;
              }
            });

            const total = pts.length;
            const leadPct = (leadCount / total * 100).toFixed(1);
            const trailPct = (trailCount / total * 100).toFixed(1);
            const tiePct = (100 - parseFloat(leadPct) - parseFloat(trailPct)).toFixed(1);

            return (
              <div className="mt-4 bg-slate-50/50 rounded-xl p-4 border border-slate-200/60">
                <div className="flex items-center justify-between mb-3">
                  <h4 className="text-xs font-bold text-slate-500 flex items-center uppercase tracking-wider">
                    <Activity className="w-3.5 h-3.5 mr-1.5 text-indigo-500" /> 盤勢分析 (Match Trend)
                  </h4>
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-bold text-slate-400">領先更迭:</span>
                    <span className="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full text-xs font-black">{leadChanges} 次</span>
                  </div>
                </div>

                <div className="space-y-3">
                  {/* 三色進度條 */}
                  <div className="h-2.5 w-full bg-slate-200 rounded-full overflow-hidden flex">
                    <div className="h-full bg-emerald-500/80 transition-all duration-500" style={{ width: `${leadPct}%` }} title={`領先: ${leadPct}%`}></div>
                    <div className="h-full bg-slate-300 transition-all duration-500" style={{ width: `${tiePct}%` }} title={`持平: ${tiePct}%`}></div>
                    <div className="h-full bg-rose-500/80 transition-all duration-500" style={{ width: `${trailPct}%` }} title={`落後: ${trailPct}%`}></div>
                  </div>

                  <div className="flex justify-between items-center text-[11px] font-bold">
                    <div className="flex items-center gap-4">
                      <span className="flex items-center text-emerald-600">
                        <span className="w-2 h-2 rounded-full bg-emerald-500 mr-1.5"></span>領先: {leadPct}%
                      </span>
                      <span className="flex items-center text-slate-500">
                        <span className="w-2 h-2 rounded-full bg-slate-400 mr-1.5"></span>持平: {tiePct}%
                      </span>
                      <span className="flex items-center text-rose-600">
                        <span className="w-2 h-2 rounded-full bg-rose-500 mr-1.5"></span>落後: {trailPct}%
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      );
    };

    // ==========================================
    // 主系統架構
    // ==========================================
    function App() {
      // --- 全域狀態管理 ---
      const [currentView, setCurrentView] = useStickyState('dashboard', 'vs_currentView');
      const [activeTeam, setActiveTeam] = useStickyState('A', 'vs_activeTeam');
      const [academicYears, setAcademicYears] = useStickyState(['114'], 'vs_academicYears');
      const [activeYear, setActiveYear] = useStickyState('114', 'vs_activeYear');
      const [rostersByYear, setRostersByYear] = useStickyState({ '114': { A: initialRoster, B: [] } }, 'vs_rostersByYear');

      // 安全存取當前年度資料
      const safeRosters = rostersByYear || {};
      const safeYears = Array.isArray(academicYears) ? academicYears : ['114'];
      const safeActiveYear = safeYears.includes(activeYear) ? activeYear : (safeYears[0] || '114');

      const currentYearData = safeRosters[safeActiveYear] || { A: [], B: [] };
      const rosterA = currentYearData.A;
      const rosterB = currentYearData.B;

      const setRosterA = (newRoster) => {
        setRostersByYear(prev => {
          const safePrev = prev || {};
          const yearData = safePrev[safeActiveYear] || { A: [], B: [] };
          const nextA = typeof newRoster === 'function' ? newRoster(yearData.A) : newRoster;
          return { ...safePrev, [safeActiveYear]: { ...yearData, A: nextA } };
        });
      };
      const setRosterB = (newRoster) => {
        setRostersByYear(prev => {
          const safePrev = prev || {};
          const yearData = safePrev[safeActiveYear] || { A: [], B: [] };
          const nextB = typeof newRoster === 'function' ? newRoster(yearData.B) : newRoster;
          return { ...safePrev, [safeActiveYear]: { ...yearData, B: nextB } };
        });
      };

      const roster = activeTeam === 'A' ? rosterA : rosterB;
      const setRoster = activeTeam === 'A' ? setRosterA : setRosterB;
      const [matches, setMatches] = useStickyState([], 'vs_matches');

      const [setupForm, setSetupForm] = useStickyState({
        opp: '對手隊伍', matchTime: '', serveFirst: 'us', matchFormat: 5,
        courtPositions: applyStandardPreset('us', initialRoster)
      }, 'vs_setupForm');

      const [matchState, setMatchState] = useStickyState(null, 'vs_matchState');
      const [currentRally, setCurrentRally] = useStickyState([], 'vs_currentRally');
      const [actionBuilder, setActionBuilder] = useStickyState({ player: null, actionType: null, blockQuality: null },
        'vs_actionBuilder');
      const [pendingBlockGroup, setPendingBlockGroup] = useStickyState([], 'vs_pendingBlockGroup');
      const [isMatchOver, setIsMatchOver] = useStickyState(false, 'vs_isMatchOver');
      const [nextSetSetup, setNextSetSetup] = useStickyState(null, 'vs_nextSetSetup');

      // --- UI 互動狀態 (不需暫存) ---
      const [showTimeoutModal, setShowTimeoutModal] = useState(false);
      const [showSubModal, setShowSubModal] = useState(false);
      const [showLiberoModal, setShowLiberoModal] = useState(false);
      const [subForm, setSubForm] = useState({ posOut: '', playerInId: '' });
      const [showEndSetModal, setShowEndSetModal] = useState(false);
      const [endSetInfo, setEndSetInfo] = useState(null);
      const [reportTab, setReportTab] = useState('overview');
      const [reportSetFilter, setReportSetFilter] = useState('all');
      const [pubTab, setPubTab] = useState('matches'); // 賽事數據 / 選手名單
      const [posFilter, setPosFilter] = useState('all'); // 球員位置篩選

      // --- 資料遷移 (Migration): 將舊版的 A/B 隊陣容移入 114 學年度 ---
      useEffect(() => {
        const legacyA = localStorage.getItem('vs_roster');
        const legacyB = localStorage.getItem('vs_roster_B');
        if (legacyA || legacyB) {
          try {
            const dataA = legacyA ? JSON.parse(legacyA) : null;
            const dataB = legacyB ? JSON.parse(legacyB) : null;
            
            setRostersByYear(prev => {
              const updated = { ...prev };
              if (!updated['114']) updated['114'] = { A: [], B: [] };
              if (dataA) updated['114'].A = dataA;
              if (dataB) updated['114'].B = dataB;
              return updated;
            });

            // 遷移完成後移除舊標籤
            localStorage.removeItem('vs_roster');
            localStorage.removeItem('vs_roster_B');
          } catch (e) {
            console.error("Migration failed", e);
          }
        }
      }, []);

      // --- 比賽資料學年度補齊 (針對舊資料) ---
      useEffect(() => {
        if (!matches || matches.length === 0) return;
        
        let needsUpdate = false;
        const updatedMatches = matches.map(m => {
          if (!m.academicYear) {
            needsUpdate = true;
            return { ...m, academicYear: getAcademicYearFromDate(m.date || m.matchTime) };
          }
          return m;
        });

        if (needsUpdate) {
          setMatches(updatedMatches);
        }
      }, [matches]);

      // --- Helpers ---
      const getValidActions = () => (currentRally || []).filter(a => a.actionCategory !== 'system');

      const isOverpassOpportunity = () => {
        const validActions = getValidActions();
        if (validActions.length === 0) return false;
        const last = validActions[validActions.length - 1];
        return (last.actionCategory === 'Receive' || last.actionCategory === 'Dig') && last.result?.id === 'overpass';
      };

      const getCurrentPhase = () => {
        if (!matchState) return 'unknown';
        if ((pendingBlockGroup || []).length > 0) return 'us_blocking_sequence';
        const validActions = getValidActions();
        if (validActions.length === 0) return matchState.serveTeam === 'us' ? 'us_serve_waiting' : 'us_receive_waiting';

        const last = validActions[validActions.length - 1];
        if (last.actionCategory === 'opponent') return 'us_defense';
        if (last.actionCategory === 'Serve' && last.result?.id === 'in') return 'opponent_transition';
        if ((last.actionCategory === 'Receive' || last.actionCategory === 'Dig') && last.result?.id === 'overpass') return 'opponent_transition';
        if (['Attack', 'BackRowAttack', 'Freeball'].includes(last.actionCategory) && ['in_play', 'success'].includes(last.result?.id)) return 'opponent_transition';
        if (last.actionCategory === 'Set' && last.result?.id === 'set_overpass') return 'opponent_transition';
        
        // ⚡ 修正多人攔網判定：只要最後一串動作中有任何人「攔回」，就切換到對手進攻
        const lastSequence = [];
        for (let i = validActions.length - 1; i >= 0; i--) {
          if (validActions[i].actionCategory === 'opponent' || validActions[i].actionCategory === 'Serve') break;
          lastSequence.push(validActions[i]);
        }
        if (lastSequence.some(a => a.actionCategory === 'Block' && a.result?.id === 'rebound_to_opponent')) return 'opponent_transition';
        if (last.actionCategory === 'Block' && last.result?.id === 'rebound_to_opponent') return 'opponent_transition';

        if (['Receive', 'Dig', 'Set', 'Block', 'Attack', 'BackRowAttack', 'Freeball'].includes(last.actionCategory)) {
          let count = 0;
          for (let i = validActions.length - 1; i >= 0; i--) {
            const a = validActions[i];
            if (a.actionCategory === 'opponent' || a.actionCategory === 'Serve') break;
            if (a.actionCategory === 'Block') {
              if (a.result?.id === 'rebound_to_opponent' || a.result?.id === 'no_touch' || a.result?.id === 'touch_out') continue;
              continue;
            }
            if (['Attack', 'BackRowAttack'].includes(a.actionCategory) && a.result?.id === 'blocked_rebound') break;
            count++;
          }
          if (count === 0) return 'us_cover';
          if (count === 1) return 'us_second_touch';
          if (count === 2) return 'us_third_touch';
          return 'opponent_transition';
        }
        return 'unknown';
      };

      // 全域變數定義區 (修正 ReferenceError 來源)
      const currentPhase = getCurrentPhase();
      const isWaitingForServe = getValidActions().length === 0;
      const showOpponentActions = !isWaitingForServe && currentPhase !== 'us_blocking_sequence' && currentPhase !==
        'opponent_transition';

      // ⚡ 智慧發球員選擇 (無縫跳轉)
      useEffect(() => {
        if (currentView === 'match' && currentPhase === 'us_serve_waiting' && matchState) {
          const p1 = matchState.starters?.p1;
          if (p1 && (!actionBuilder.player || actionBuilder.player.id !== p1.id || actionBuilder.actionType !== 'Serve')) {
            setActionBuilder({ player: { ...p1, courtPosLabel: 'P1' }, actionType: 'Serve', blockQuality: null });
          }
        }
      }, [currentView, currentPhase, matchState?.starters?.p1?.id, actionBuilder.player?.id, actionBuilder.actionType]);

      const checkIsDisabled = (pId, posLabel) => {
        if (currentPhase === 'us_blocking_sequence') {
          if (['P1', 'P5', 'P6', 'L1', 'L'].includes(posLabel)) return true; // 後排不可攔網
          return (pendingBlockGroup || []).some(b => b.player?.id === pId);
        }
        const validActions = getValidActions();
        if (validActions.length === 0) return false;
        const last = validActions[validActions.length - 1];
        if (last.actionCategory === 'Block' || last.actionCategory === 'opponent') return false;
        if (['Attack', 'BackRowAttack'].includes(last.actionCategory) && last.result?.id === 'blocked_rebound') return false;
        return last.player?.id === pId;
      };

      const getAvailableActionKeys = () => {
        let keys = [];
        switch (currentPhase) {
          case 'us_serve_waiting': keys = ['Serve']; break;
          case 'us_receive_waiting': keys = ['Receive']; break;
          case 'us_second_touch': keys = ['Set', 'Attack', 'Freeball']; break;
          case 'us_third_touch': keys = ['Attack', 'Freeball']; break;
          case 'us_defense': keys = ['Block', 'Dig', 'Attack']; break;
          case 'us_blocking_sequence': keys = ['Block']; break;
          case 'us_cover': keys = ['Dig', 'Set', 'Freeball']; break;
          default: keys = [];
        }
        if (actionBuilder.player) {
          const pos = actionBuilder.player.courtPosLabel;
          const isLibero = actionBuilder.player.positions?.includes('L');
          
          // 1. 後排不可攔網
          if (keys.includes('Block') && ['P1', 'P5', 'P6', 'L1', 'L'].includes(pos)) keys = keys.filter(k => k !== 'Block');
          
          // 2. 自由球員不可攻擊 (不論前排後排)
          if (isLibero) {
            keys = keys.filter(k => k !== 'Attack' && k !== 'BackRowAttack');
          } else {
            // 3. 後排球員一般攻擊轉為後排攻擊
            if (keys.includes('Attack') && ['P1', 'P5', 'P6'].includes(pos)) {
              keys = keys.map(k => k === 'Attack' ? 'BackRowAttack' : k);
            }
          }
        }
        return keys;
      };
      const availableActionKeys = getAvailableActionKeys();

      // --- Action Handlers ---
      const goDashboard = () => setCurrentView('dashboard');

      const goSetup = () => {
        setSetupForm(prev => ({ ...prev, courtPositions: applyStandardPreset(prev.serveFirst, roster) }));
        setCurrentView('setup');
      };

      const handleSetupPosChange = (field, newPlayerId) => {
        setSetupForm(prev => {
          const next = { ...prev, courtPositions: { ...prev.courtPositions } };
          if (newPlayerId !== '') {
            Object.keys(next.courtPositions).forEach(key => {
              if (key !== field && next.courtPositions[key] === newPlayerId) next.courtPositions[key] = '';
            });
          }
          next.courtPositions[field] = newPlayerId;
          return next;
        });
      };

      const handleNextSetPosChange = (field, newPlayerId) => {
        setNextSetSetup(prev => {
          const next = { ...prev, courtPositions: { ...prev.courtPositions } };
          if (newPlayerId !== '') {
            Object.keys(next.courtPositions).forEach(key => {
              if (key !== field && next.courtPositions[key] === newPlayerId) next.courtPositions[key] = '';
            });
          }
          next.courtPositions[field] = newPlayerId;
          return next;
        });
      };

      const resolveStartersData = (formPositions) => {
        const starters = {
          p1: roster.find(r => r.id === parseInt(formPositions.p1)),
          p2: roster.find(r => r.id === parseInt(formPositions.p2)),
          p3: roster.find(r => r.id === parseInt(formPositions.p3)),
          p4: roster.find(r => r.id === parseInt(formPositions.p4)),
          p5: roster.find(r => r.id === parseInt(formPositions.p5)),
          p6: roster.find(r => r.id === parseInt(formPositions.p6)),
        };
        const libero = roster.find(r => r.id === parseInt(formPositions.l1)) || null;
        const subs = ['b1', 'b2', 'b3', 'b4', 'b5'].map(key => roster.find(r => r.id ===
          parseInt(formPositions[key]))).filter(Boolean);
        const matchRoster = [...Object.values(starters), libero, ...subs].filter(Boolean);
        return { starters, libero, matchRoster };
      };

      const startMatch = () => {
        const isCourtReady = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6'].every(key => setupForm.courtPositions[key] !== '');
        if (!isCourtReady) return alert("請填滿場上 1~6 號位先發選手");

        // 自動換算學年度
        const matchYear = getAcademicYearFromDate(setupForm.matchTime);
        
        // 如果該學年度還不存在，自動建立它
        const currentYears = Array.isArray(academicYears) ? academicYears : [];
        if (!currentYears.includes(matchYear)) {
          setAcademicYears(prev => [...(prev || []), matchYear]);
          setRostersByYear(prev => ({ ...(prev || {}), [matchYear]: { A: [], B: [] } }));
        }
        
        // 切換目前檢視為該比賽年度
        setActiveYear(matchYear);

        const { starters, libero, matchRoster } = resolveStartersData(setupForm.courtPositions);

        setMatchState({
          id: Date.now(), 
          date: setupForm.matchTime || new Date().toLocaleDateString(), 
          matchTime: setupForm.matchTime,
          academicYear: matchYear, 
          lastUpdated: new Date().toLocaleTimeString(),
          opponent: setupForm.opp, matchFormat: setupForm.matchFormat, starters, libero, matchRoster,
          serveTeam: setupForm.serveFirst, score: { us: 0, them: 0 }, setsUs: 0, setsThem: 0,
          currentSet: 1, setScores: [], history: [], liberoTracker: { outPlayer: null }
        });
        setCurrentRally([]); setPendingBlockGroup([]); setShowEndSetModal(false); setEndSetInfo(null); setIsMatchOver(false);

        if (setupForm.serveFirst === 'us') {
          setActionBuilder({ player: { ...starters.p1, courtPosLabel: 'P1' }, actionType: 'Serve', blockQuality: null });
        } else {
          setActionBuilder({ player: null, actionType: null, blockQuality: null });
        }
        setCurrentView('match');
      };

      const startNextSet = () => {
        if (!nextSetSetup) return;
        const isCourtReady = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6'].every(key => nextSetSetup.courtPositions[key] !== '');
        if (!isCourtReady) return alert("請填滿場上 1~6 號位先發選手");

        const { starters, libero, matchRoster } = resolveStartersData(nextSetSetup.courtPositions);

        setMatchState(prev => ({
          ...prev, currentSet: prev.currentSet + 1, score: { us: 0, them: 0 },
          serveTeam: nextSetSetup.serveTeam, starters, libero, matchRoster, liberoTracker: { outPlayer: null }
        }));

        setCurrentRally([]);
        setPendingBlockGroup([]);

        if (nextSetSetup.serveTeam === 'us') {
          setActionBuilder({ player: { ...starters.p1, courtPosLabel: 'P1' }, actionType: 'Serve', blockQuality: null });
        } else {
          setActionBuilder({ player: null, actionType: null, blockQuality: null });
        }
        setCurrentView('match');
      };

      const handleSaveAndExit = () => {
        if (!matchState) return;
        const matchDataToSave = {
          ...matchState, currentRally, pendingBlockGroup, actionBuilder, isMatchOver, lastUpdated: new
            Date().toLocaleTimeString()
        };
        setMatches(prev => {
          const existingIdx = (prev || []).findIndex(m => m.id === matchDataToSave.id);
          if (existingIdx >= 0) {
            const next = [...(prev || [])];
            next[existingIdx] = matchDataToSave;
            return next;
          }
          return [matchDataToSave, ...(prev || [])];
        });
        setCurrentView('dashboard');
      };

      const resumeMatch = (m) => {
        setMatchState({
          id: m.id, date: m.date, opponent: m.opponent, matchFormat: m.matchFormat, starters: m.starters,
          libero: m.libero, matchRoster: m.matchRoster, score: m.score, setsUs: m.setsUs, setsThem: m.setsThem,
          currentSet: m.currentSet, setScores: m.setScores, serveTeam: m.serveTeam, history: m.history,
          liberoTracker: m.liberoTracker || { outPlayer: null }
        });
        setCurrentRally(m.currentRally || []);
        setPendingBlockGroup(m.pendingBlockGroup || []);
        setActionBuilder(m.actionBuilder || { player: null, actionType: null, blockQuality: null });
        setIsMatchOver(m.isMatchOver || false);
        setCurrentView('match');
      };

      const viewReport = (m) => {
        setMatchState(m);
        setCurrentView('report');
        setReportTab('overview');
        setReportSetFilter('all');
      };

      const handlePlayerClick = (player, courtPosLabel, isDisabled) => {
        if (currentPhase === 'opponent_transition' || isDisabled) return;
        if (currentPhase === 'us_blocking_sequence') setActionBuilder({
          player: { ...player, courtPosLabel }, actionType: 'Block',
          blockQuality: null
        });
        else if (currentPhase === 'us_receive_waiting') setActionBuilder({
          player: { ...player, courtPosLabel }, actionType:
            'Receive', blockQuality: null
        });
        else if (currentPhase === 'us_serve_waiting') setActionBuilder({
          player: { ...player, courtPosLabel }, actionType:
            'Serve', blockQuality: null
        });
        else setActionBuilder({ player: { ...player, courtPosLabel }, actionType: null, blockQuality: null });
      };

      const handleActionTypeClick = (type) => setActionBuilder({ ...actionBuilder, actionType: type });

      const resolveBlockGroupData = (groupArray) => {
        if (groupArray.length === 0) return;
        const hasError = groupArray.find(b => b.result.id === 'error');
        const hasTouchOut = groupArray.find(b => b.result.id === 'touch_out');
        const hasStuff = groupArray.find(b => b.result.id === 'stuff');
        const newRally = [...(currentRally || []), ...groupArray];

        if (hasError || hasTouchOut) endRally('them', newRally);
        else if (hasStuff) endRally('us', newRally);
        else setCurrentRally(newRally);

        setPendingBlockGroup([]);
        setActionBuilder({ player: null, actionType: null, blockQuality: null });
      };

      const handleBlockQualityClick = (quality) => {
        // 恢復為個別選擇結果的邏輯，不自動繼承，以符合「不同攔網者可能觸碰狀況不同」的需求
        setActionBuilder({ ...actionBuilder, blockQuality: quality });
      };

      const handleResultClick = (result) => {
        const newAction = {
          id: Date.now(), player: actionBuilder.player, actionCategory: actionBuilder.actionType,
          blockQuality: actionBuilder.blockQuality, result: result
        };
        if (actionBuilder.actionType === 'Block') {
          const newGroup = [...(pendingBlockGroup || []), newAction];
          if (newGroup.length >= 3) resolveBlockGroupData(newGroup);
          else { setPendingBlockGroup(newGroup); setActionBuilder({ player: null, actionType: null, blockQuality: null }); }
          return;
        }
        if (result.point) endRally(result.point, [...(currentRally || []), newAction]);
        else {
          setCurrentRally([...(currentRally || []), newAction]); setActionBuilder({
            player: null, actionType: null,
            blockQuality: null
          });
        }
      };

      const checkSetWin = (scoreUs, scoreThem, setNum, format) => {
        const isFinalSet = setNum === format;
        const winScore = isFinalSet ? 15 : 25;
        if (scoreUs >= winScore && scoreUs - scoreThem >= 2) return 'us';
        if (scoreThem >= winScore && scoreThem - scoreUs >= 2) return 'them';
        return null;
      };

      const endRally = (winner, finalActions = currentRally) => {
        const newScoreUs = matchState.score.us + (winner === 'us' ? 1 : 0);
        const newScoreThem = matchState.score.them + (winner === 'them' ? 1 : 0);
        let newServeTeam = matchState.serveTeam;
        let newStarters = { ...matchState.starters };
        let newLiberoTracker = matchState.liberoTracker || { outPlayer: null };

        // 輪轉與自由球員防呆
        if (winner === 'us' && matchState.serveTeam === 'them') {
          newServeTeam = 'us';
          newStarters = {
            p1: matchState.starters.p2, p2: matchState.starters.p3, p3: matchState.starters.p4, p4:
              matchState.starters.p5, p5: matchState.starters.p6, p6: matchState.starters.p1
          };

          // 自由球員不可到前排 P4
          if (matchState.libero && newStarters.p4?.id === matchState.libero.id) {
            const returnPlayer = newLiberoTracker.outPlayer || matchState.matchRoster.find(p => p.positions.includes('MB') && p.id
              !== matchState.libero.id);
            newStarters.p4 = returnPlayer;
            newLiberoTracker = { outPlayer: null };
            finalActions.push({
              id: Date.now() + 1, player: { name: '系統', number: '-', position: 'SYS' }, actionCategory: 'system',
              result: { label: `自由球員因輪轉自動退場，換回 #${returnPlayer?.number || ''}`, type: 'neutral' }
            });
          }
        } else if (winner === 'them' && matchState.serveTeam === 'us') {
          newServeTeam = 'them';
        }

        const rallyDataForHistory = {
          winner,
          setNum: matchState.currentSet || 1,
          actions: [...finalActions], // 確保是複製品
          scoreUs: newScoreUs,
          scoreThem: newScoreThem,
          starters: { ...matchState.starters }, // 儲存該分起手站位 (結算前快照)
          // 真・時光倒流必備的歷史快照
          prevScore: { ...(matchState.score || { us: 0, them: 0 }) },
          prevServeTeam: matchState.serveTeam,
          prevStarters: { ...(matchState.starters || {}) },
          prevLiberoTracker: { ...(matchState.liberoTracker || { outPlayer: null }) },
          prevSetsUs: matchState.setsUs || 0,
          prevSetsThem: matchState.setsThem || 0,
          prevCurrentSet: matchState.currentSet || 1,
          prevSetScores: [...(matchState.setScores || [])]
        };

        const setWinner = checkSetWin(newScoreUs, newScoreThem, matchState.currentSet, matchState.matchFormat);

        if (setWinner) {
          const newSetsUs = matchState.setsUs + (setWinner === 'us' ? 1 : 0);
          const newSetsThem = matchState.setsThem + (setWinner === 'them' ? 1 : 0);
          const isMatchOverNow = newSetsUs === (matchState.matchFormat === 3 ? 2 : 3) || newSetsThem === (matchState.matchFormat
            === 3 ? 2 : 3);

          setMatchState(prev => ({
            ...prev, score: { us: newScoreUs, them: newScoreThem }, history: [...(prev.history || []), rallyDataForHistory],
            setsUs: newSetsUs, setsThem: newSetsThem, setScores: [...(prev.setScores || []), {
              us: newScoreUs, them: newScoreThem
            }], liberoTracker: newLiberoTracker
          }));
          setIsMatchOver(isMatchOverNow); setEndSetInfo({ winner: setWinner, scoreUs: newScoreUs, scoreThem: newScoreThem });
          setShowEndSetModal(true); setActionBuilder({ player: null, actionType: null, blockQuality: null });
        } else {
          setMatchState(prev => ({
            ...prev, score: { us: newScoreUs, them: newScoreThem }, serveTeam: newServeTeam, starters:
              newStarters, history: [...(prev.history || []), rallyDataForHistory], liberoTracker: newLiberoTracker
          }));

          // ⚡ 智慧自動提示：攔中發球輪結束（Side-out），自動提示更換自由球員
          if (winner === 'them' && matchState.serveTeam === 'us') {
            const server = matchState.starters?.p1;
            if (server?.positions?.includes('MB')) {
              setTimeout(() => setShowLiberoModal(true), 400);
            }
          }

          if (newServeTeam === 'us') setActionBuilder({
            player: { ...newStarters.p1, courtPosLabel: 'P1' }, actionType: 'Serve',
            blockQuality: null
          });
          else setActionBuilder({ player: null, actionType: null, blockQuality: null });
        }
        setCurrentRally([]); setPendingBlockGroup([]);
      };

      const handleSpecialAction = (type, detail, pointWinner = null, customPlayerName = null, meta = {}) => {
        const pName = customPlayerName || (type === 'opponent' ? '對手' : (detail.includes('落地') ? '防守空檔' : '系統'));
        const newAction = {
          id: Date.now(), player: { name: pName, number: '-', position: 'SYS' }, actionCategory: type, result:
          {
            id: detail, label: detail, type: pointWinner === 'us' ? 'good' : pointWinner === 'them' ? 'bad' : 'neutral', point:
              pointWinner
          },
          meta: { ...meta, prevStarters: { ...matchState.starters }, prevLiberoTracker: { ...(matchState.liberoTracker || {}) } }
        };
        const baseRally = [...(currentRally || []), ...(pendingBlockGroup || [])];
        if (pointWinner) endRally(pointWinner, [...baseRally, newAction]);
        else { setCurrentRally([...baseRally, newAction]); setPendingBlockGroup([]); }
      };

      // 修正 Modal 中的跳轉呼叫
      const handleGotoNextSet = (firstServeTeam) => {
        setNextSetSetup({ serveTeam: firstServeTeam, courtPositions: applyStandardPreset(firstServeTeam, roster) });
        setCurrentView('next_set_setup');
        setShowEndSetModal(false); setEndSetInfo(null);
      };

      const handleRevertOrUndo = () => {
        // 1. 撤回當下未結算的動作
        if ((pendingBlockGroup || []).length > 0 || (currentRally || []).length > 0) {
          setPendingBlockGroup([]);
          setCurrentRally([]);
          setActionBuilder({ player: null, actionType: null, blockQuality: null });
        }
        // 2. 當下回合已結算且沒有未結算動作，啟動「跨回合回溯」
        else if (matchState.history && matchState.history.length > 0) {
          const lastHistory = matchState.history[matchState.history.length - 1];
          setMatchState(prev => ({
            ...prev,
            score: lastHistory.prevScore,
            serveTeam: lastHistory.prevServeTeam,
            starters: lastHistory.prevStarters,
            liberoTracker: lastHistory.prevLiberoTracker,
            setsUs: lastHistory.prevSetsUs,
            setsThem: lastHistory.prevSetsThem,
            currentSet: lastHistory.prevCurrentSet,
            setScores: lastHistory.prevSetScores,
            history: prev.history.slice(0, -1)
          }));
          // 把剛才結算的動作退回到畫面，但不含最後一個導致得失分的動作
          setCurrentRally([]);
          setPendingBlockGroup([]);
          setActionBuilder({ player: null, actionType: null, blockQuality: null });
          setShowEndSetModal(false); setEndSetInfo(null); setIsMatchOver(false);
        }
      };

      const undoSingleLastAction = () => {
        if ((pendingBlockGroup || []).length > 0) {
          setPendingBlockGroup(pendingBlockGroup.slice(0, -1));
        } else if ((currentRally || []).length > 0) {
          const lastAction = currentRally[currentRally.length - 1];
          // ⚡ 強度撤銷：如果是調度動作，將站位與自由球員狀態還原
          if (lastAction.meta?.prevStarters) {
            setMatchState(prev => ({
              ...prev,
              starters: lastAction.meta.prevStarters,
              liberoTracker: lastAction.meta.prevLiberoTracker || prev.liberoTracker
            }));
          }
          setCurrentRally(currentRally.slice(0, -1));
          setActionBuilder({ player: null, actionType: null, blockQuality: null });
        }
      };

      const handleTimeout = (team) => {
        const teamName = team === 'us' ? '我方' : '對手';
        const scoreStr = `${matchState.score.us}:${matchState.score.them}`;
        handleSpecialAction('system', `${teamName}請求暫停 (比分 ${scoreStr})`, null, '暫停');
        setShowTimeoutModal(false);
      };

      const handleSubSubmit = () => {
        if (!subForm.posOut || !subForm.playerInId) return;
        const playerOut = matchState.starters[subForm.posOut];
        const playerIn = matchState.matchRoster.find(p => p.id === parseInt(subForm.playerInId));
        const newStarters = { ...matchState.starters, [subForm.posOut]: playerIn };
        setMatchState(prev => ({ ...prev, starters: newStarters }));
        handleSpecialAction('system', `換人: #${playerIn.number} ${playerIn.name} 替換 #${playerOut.number} ${playerOut.name}`,
          null, '調度');

        setShowSubModal(false); setSubForm({ posOut: '', playerInId: '' });
      };

      const handleLiberoSubmit = () => {
        const { starters, matchRoster, libero } = matchState;
        const liberoOnCourtPos = libero ? Object.keys(starters).find(pos => starters[pos]?.id === libero.id) : null;
        const isLiberoOnCourt = !!liberoOnCourtPos;

        let playerOut, playerIn, targetPos;
        let newLiberoTracker = { ...matchState.liberoTracker };

        if (isLiberoOnCourt) {
          if (!subForm.playerInId) return;
          playerOut = libero; playerIn = matchRoster.find(p => p.id === parseInt(subForm.playerInId)); targetPos =
            liberoOnCourtPos;
          newLiberoTracker.outPlayer = null;
        } else {
          if (!subForm.posOut) return;
          playerOut = starters[subForm.posOut]; playerIn = libero; targetPos = subForm.posOut;
          newLiberoTracker.outPlayer = playerOut;
        }

        const newStarters = { ...starters, [targetPos]: playerIn };
        setMatchState(prev => ({ ...prev, starters: newStarters, liberoTracker: newLiberoTracker }));
        handleSpecialAction('system', `L 交換: #${playerIn.number} ${playerIn.name} 替換 #${playerOut.number} ${playerOut.name}`,
          null, '調度');

        setShowLiberoModal(false); setSubForm({ posOut: '', playerInId: '' });
      };

      // --- 畫面渲染 Component Functions ---
      const renderPlayerSelect = (label, value, field, onChangeHandler) => (
        <div key={field} className="flex flex-col bg-white p-2 rounded shadow-sm border border-slate-200">
          <span className="text-[11px] font-bold text-slate-500 mb-1 tracking-wider">{label}</span>
          <select value={value} onChange={e => onChangeHandler(field, e.target.value)} className="p-1.5 text-sm border-0
    bg-slate-50 text-slate-700 rounded outline-none focus:ring-1 focus:ring-blue-500 font-medium">
            <option value="">請選擇...</option>
            {(roster || initialRoster).map(p => <option key={p.id} value={p.id.toString()}>#{p.number} {p.name}</option>)}
          </select>
        </div>
      );

      const renderPlayerCourtNode = (p, posLabel) => {
        if (!p) return <div key={posLabel}
          className="p-4 rounded-full aspect-square border-2 border-dashed border-blue-400/30 flex items-center justify-center">
          <span className="text-slate-500 text-xs">{posLabel}</span></div>;
        const dis = checkIsDisabled(p.id, posLabel);
        const sel = actionBuilder.player?.id === p.id;
        let st = 'bg-slate-800 hover:bg-slate-700 border-2 border-slate-600';
        if (dis) st = 'bg-slate-800/30 border-2 border-red-900/40 opacity-40 cursor-not-allowed';
        if (sel) st = 'bg-blue-600 ring-4 ring-blue-400 scale-110 shadow-[0_0_20px_rgba(59,130,246,0.6)] z-10';
        return (
          <button key={posLabel} onClick={() => handlePlayerClick(p, posLabel, dis)} className={`relative flex flex-col
  items-center justify-center p-3 rounded-full aspect-square transition-all shadow-lg ${st}`}>
            <span
              className="absolute -top-2 bg-slate-900 px-2 py-0.5 rounded-full text-[10px] text-blue-300 font-mono border border-slate-700">{posLabel}</span>
            <span className="text-[10px] text-slate-400 font-bold mb-0.5">{(p.positions || []).join(',')}</span>
            <span className="text-2xl font-black text-white leading-none mb-1">{p.number}</span>
            <span className="text-[11px] text-slate-300 truncate w-full text-center">{p.name}</span>
            {dis && <span className="absolute -bottom-4 text-[10px] text-red-400 font-bold">不可選</span>}
          </button>
        );
      };

      // 匯入 JSON（系統全備份 / 單場備份）
      const handleSecretImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.type === 'FULL_SYSTEM_BACKUP' || (data.matches && data.rostersByYear)) {
              if (!confirm('將覆蓋目前所有資料，確定要匯入嗎？')) return;
              if (data.matches) setMatches(data.matches);
              if (data.academicYears) setAcademicYears(data.academicYears);
              if (data.activeYear) setActiveYear(data.activeYear);
              if (data.rostersByYear) setRostersByYear(data.rostersByYear);
              if (data.setupForm) setSetupForm(data.setupForm);
              alert('匯入成功');
            } else if (data.id && data.history) {
              setMatches(prev => {
                const list = prev || [];
                const exists = list.find(m => m.id === data.id);
                return exists ? list.map(m => m.id === data.id ? data : m) : [data, ...list];
              });
              alert('單場匯入成功');
            } else {
              alert('格式不正確');
            }
          } catch (err) {
            alert('解析失敗：' + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const renderDashboard = () => {
        const filteredMatches = (matches || [])
          .filter(m => {
            if (!m) return false;
            const ay = m.academicYear || getAcademicYearFromDate(m.date || m.matchTime);
            return String(ay) === String(safeActiveYear);
          })
          .sort((a, b) => (b.id || 0) - (a.id || 0));

        const winCount = filteredMatches.filter(m => {
          const us = m.score?.us || 0, them = m.score?.them || 0;
          return us > them || m.winner === 'us' || (m.setsUs || 0) > (m.setsThem || 0);
        }).length;
        const lossCount = filteredMatches.length - winCount;

        const formatDateShort = (s) => {
          if (!s) return '-';
          try {
            const d = new Date(String(s).replace(/\//g, '-'));
            if (isNaN(d.getTime())) return s;
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
          } catch { return s; }
        };

        const yearOptions = [...(safeYears || [])].sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
        const sortedRoster = [...(roster || [])].sort((a, b) => (a.number || 0) - (b.number || 0));

        const posColors = {
          S: 'bg-blue-100 text-blue-700',
          OH: 'bg-emerald-100 text-emerald-700',
          MB: 'bg-amber-100 text-amber-700',
          OPP: 'bg-fuchsia-100 text-fuchsia-700',
          L: 'bg-violet-100 text-violet-700',
        };

        const posFilters = ['all', 'S', 'OH', 'MB', 'OPP', 'L'];
        const filteredRoster = sortedRoster.filter(p =>
          posFilter === 'all' || (p.positions || []).includes(posFilter)
        );

        return (
          <div className="min-h-screen bg-slate-50">
            {/* Header */}
            <header className="bg-white border-b border-slate-200 sticky top-0 z-20 backdrop-blur bg-white/85">
              <div className="max-w-5xl mx-auto px-4 md:px-6 py-3 flex items-center justify-between gap-3 flex-wrap">
                <div className="flex items-center gap-3">
                  <svg viewBox="0 0 36 36" fill="none" stroke="#f59e0b" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" className="w-10 h-10 shrink-0">
                    <circle cx="18" cy="20" r="11" />
                    <path d="M13 10 L 6 7 L 9 14" />
                    <path d="M23 10 L 30 7 L 27 14" />
                    <circle cx="14" cy="18" r="0.9" fill="#f59e0b" stroke="none" />
                    <circle cx="22" cy="18" r="0.9" fill="#f59e0b" stroke="none" />
                    <path d="M17 23 L 19 23 L 18 24.5 Z" fill="#f59e0b" stroke="none" />
                    <path d="M18 25 Q 16 27 14 26" strokeWidth="1.2" />
                    <path d="M18 25 Q 20 27 22 26" strokeWidth="1.2" />
                    <path d="M14.5 12 L 14.5 15" strokeWidth="1.3" />
                    <path d="M21.5 12 L 21.5 15" strokeWidth="1.3" />
                    <path d="M9 19 L 11 19" strokeWidth="1.3" />
                    <path d="M27 19 L 25 19" strokeWidth="1.3" />
                  </svg>
                  <div>
                    <h1 className="text-base md:text-lg font-black text-slate-800 leading-tight">臺大土木男排</h1>
                    <p className="text-[10px] text-slate-400 font-medium tracking-wider">VolleyStat Pro</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <label className="cursor-pointer p-1 text-slate-200 hover:text-slate-400 transition">
                    <Upload className="w-3.5 h-3.5" />
                    <input type="file" accept=".json,application/json" className="hidden" onChange={handleSecretImport} />
                  </label>
                  {yearOptions.length > 0 && (
                    <select value={safeActiveYear} onChange={e => setActiveYear(e.target.value)}
                      className="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-300 cursor-pointer">
                      {yearOptions.map(y => <option key={y} value={y}>{y} 學年度</option>)}
                    </select>
                  )}
                </div>
              </div>
              {/* Tabs */}
              <div className="max-w-5xl mx-auto px-4 md:px-6 flex gap-1 -mb-px">
                {[
                  { id: 'matches', label: '賽事數據', icon: Trophy },
                  { id: 'roster',  label: '選手名單', icon: Users },
                ].map(t => (
                  <button key={t.id}
                    onClick={() => setPubTab(t.id)}
                    className={`px-4 py-2.5 text-sm font-bold flex items-center gap-1.5 border-b-2 transition
                      ${pubTab === t.id ? 'border-sky-500 text-sky-500' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                    <t.icon className="w-4 h-4" /> {t.label}
                  </button>
                ))}
              </div>
            </header>

            {/* 賽事數據 */}
            {pubTab === 'matches' && (
              <div className="max-w-5xl mx-auto p-4 md:p-6">
                <div className="flex items-end justify-between mb-5">
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 tracking-tight">{safeActiveYear} 學年度賽事</h2>
                    <p className="text-sm text-slate-500 mt-0.5">
                      {filteredMatches.length === 0 ? '尚無賽事紀錄' : `共 ${filteredMatches.length} 場 · ${winCount} 勝 ${lossCount} 敗`}
                    </p>
                  </div>
                </div>
                {filteredMatches.length === 0 ? (
                  <div className="text-center py-20 text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                    <Trophy className="w-16 h-16 mx-auto mb-3 opacity-30" />
                    <p className="text-sm font-bold">{safeActiveYear} 學年度尚無賽事數據</p>
                    <p className="text-xs mt-1 text-slate-400">請從上方切換其他學年度</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {filteredMatches.map(m => {
                      const us = m.setsUs ?? m.score?.us ?? 0;
                      const them = m.setsThem ?? m.score?.them ?? 0;
                      const won = m.winner === 'us' || us > them;
                      return (
                        <button key={m.id} onClick={() => viewReport(m)}
                          className={`group text-left bg-white rounded-2xl shadow-sm border-2 transition-all hover:shadow-md hover:-translate-y-0.5 hover:border-indigo-300
                            ${won ? 'border-emerald-200/80' : 'border-slate-200'}`}>
                          <div className={`px-5 py-3 rounded-t-2xl flex items-center justify-between ${won ? 'bg-emerald-50' : 'bg-slate-50'}`}>
                            <span className={`text-xs font-black tracking-wider uppercase ${won ? 'text-emerald-700' : 'text-slate-500'}`}>
                              {won ? 'W · 勝利' : 'L · 落敗'}
                            </span>
                            <span className="text-[11px] font-bold text-slate-400">{formatDateShort(m.date)}</span>
                          </div>
                          <div className="p-5">
                            <div className="flex items-baseline justify-between mb-2">
                              <h3 className="text-lg font-black text-slate-800 truncate">vs {m.opponent || '對手'}</h3>
                              <span className="text-[10px] font-bold text-slate-400">{m.matchFormat === 3 ? '三局制' : '五局制'}</span>
                            </div>
                            <div className="flex items-center justify-center my-3 gap-4">
                              <span className={`text-4xl font-black ${won ? 'text-emerald-600' : 'text-slate-700'}`}>{us}</span>
                              <span className="text-slate-300 text-2xl font-light">:</span>
                              <span className={`text-4xl font-black ${won ? 'text-slate-400' : 'text-rose-500'}`}>{them}</span>
                            </div>
                            {(m.setScores || []).length > 0 && (
                              <div className="flex flex-wrap gap-1 justify-center pt-2 border-t border-slate-100">
                                {(m.setScores || []).map((s, i) => (
                                  <span key={i} className="text-[11px] font-mono text-slate-500 bg-slate-100 px-2 py-0.5 rounded">
                                    {s.us}-{s.them}
                                  </span>
                                ))}
                              </div>
                            )}
                            <div className="text-[11px] text-slate-400 text-center mt-2 font-medium">
                              {m.isMatchOver ? `全場共 ${(m.history || []).length} 個回合` : `進行至第 ${m.currentSet} 局`}
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* 選手名單 */}
            {pubTab === 'roster' && (
              <div className="max-w-5xl mx-auto p-4 md:p-6">
                <div className="flex items-end justify-between mb-5 flex-wrap gap-3">
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 tracking-tight">{safeActiveYear} 學年度名單</h2>
                    <p className="text-sm text-slate-500 mt-0.5">{activeTeam} 隊 · 共 {sortedRoster.length} 人</p>
                  </div>
                  <div className="flex bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                    {['A', 'B'].map(t => (
                      <button key={t} onClick={() => setActiveTeam(t)}
                        className={`px-5 py-1.5 rounded-lg text-sm font-black transition ${activeTeam === t ? 'bg-emerald-100 text-emerald-700 border border-emerald-300 shadow-sm' : 'text-slate-500 hover:text-emerald-700'}`}>
                        {t} 隊
                      </button>
                    ))}
                  </div>
                </div>

                {/* 位置篩選 */}
                <div className="flex flex-wrap gap-2 mb-4">
                  {posFilters.map(pos => (
                    <button key={pos} onClick={() => setPosFilter(pos)}
                      className={`px-4 py-1.5 text-sm font-bold rounded-full transition border ${
                        posFilter === pos
                          ? 'bg-emerald-100 text-emerald-700 border-emerald-300 shadow-sm'
                          : 'bg-white text-slate-600 border-slate-200 hover:border-emerald-300'
                      }`}>
                      {pos === 'all' ? '全部' : pos}
                    </button>
                  ))}
                </div>

                {sortedRoster.length === 0 ? (
                  <div className="text-center py-20 text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                    <Users className="w-16 h-16 mx-auto mb-3 opacity-30" />
                    <p className="text-sm font-bold">{activeTeam} 隊尚無選手</p>
                  </div>
                ) : (
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="text-slate-400 text-xs font-bold uppercase tracking-wider border-b border-slate-100 bg-slate-50/50">
                          <th className="px-4 py-3 w-16 text-center">#</th>
                          <th className="px-4 py-3">姓名</th>
                          <th className="px-4 py-3 text-center">位置</th>
                          <th className="px-4 py-3 text-center">年級</th>
                          <th className="px-4 py-3 text-center">身高</th>
                          <th className="px-4 py-3 text-center">慣用手</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredRoster.map(p => (
                          <tr key={p.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50/60 transition">
                            <td className="px-4 py-3 text-center">
                              <span className="inline-flex w-9 h-9 bg-slate-100 text-slate-700 rounded-full items-center justify-center font-black text-sm">
                                {p.number}
                              </span>
                            </td>
                            <td className="px-4 py-3 font-bold text-slate-800">{p.name}</td>
                            <td className="px-4 py-3">
                              <div className="flex flex-wrap gap-1 justify-center">
                                {(p.positions || []).map(pos => (
                                  <span key={pos} className={`text-[10px] font-black px-2 py-0.5 rounded ${posColors[pos] || 'bg-slate-100 text-slate-600'}`}>
                                    {pos}
                                  </span>
                                ))}
                              </div>
                            </td>
                            <td className="px-4 py-3 text-center">
                              <span className="text-xs font-medium text-slate-600 bg-slate-100 px-3 py-1 rounded-full">
                                {p.grade || '—'}
                              </span>
                            </td>
                            <td className="px-4 py-3 text-center text-sm text-slate-600 font-mono">{p.height || '—'}</td>
                            <td className="px-4 py-3 text-center text-sm text-slate-600">{p.hand || '右手'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {filteredRoster.length === 0 && (
                      <div className="text-center py-12 text-slate-400 text-sm border-t border-slate-100">
                        無符合「{posFilter}」位置的選手
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <footer className="max-w-5xl mx-auto px-6 py-10 text-center text-[11px] text-slate-400">
              僅顯示公開資料 · 內部評分不對外公開
            </footer>
          </div>
        );
      };

      const renderMatchSetup = () => (
        <div className="p-6 max-w-4xl mx-auto mt-6 bg-white rounded-xl shadow-sm border border-slate-200 mb-10">
          <h2 className="text-2xl font-bold mb-6 border-b pb-4">建立新的覆盤紀錄</h2>
          <div className="space-y-8">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">對手隊伍名稱</label>
                <input type="text" value={setupForm.opp} onChange={e => setSetupForm({ ...setupForm, opp: e.target.value })} className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入對手名稱..." />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">比賽時間</label>
                <input type="text" value={setupForm.matchTime} onChange={e => setSetupForm({ ...setupForm, matchTime: e.target.value })} className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如: 2024/04/24 10:00" />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">賽制選擇</label>
                <div className="flex gap-3">
                  <button onClick={() => setSetupForm({ ...setupForm, matchFormat: 3 })} className={`flex-1 py-2.5 rounded-lg font-bold border transition ${setupForm.matchFormat === 3 ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-600'}`}>三局二勝</button>
                  <button onClick={() => setSetupForm({ ...setupForm, matchFormat: 5 })} className={`flex-1 py-2.5 rounded-lg font-bold border transition ${setupForm.matchFormat === 5 ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-600'}`}>五局三勝</button>
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">首局第一球發球方</label>
                <div className="flex gap-3">
                  <button onClick={() => setSetupForm(prev => ({ ...prev, serveFirst: 'us', courtPositions: applyStandardPreset('us', roster) }))} className={`flex-1 py-2.5 rounded-lg font-bold border transition ${setupForm.serveFirst === 'us' ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-600'}`}>我方發球</button>
                  <button onClick={() => setSetupForm(prev => ({ ...prev, serveFirst: 'them', courtPositions: applyStandardPreset('them', roster) }))} className={`flex-1 py-2.5 rounded-lg font-bold border transition ${setupForm.serveFirst === 'them' ? 'bg-red-600 text-white border-red-600' : 'bg-slate-50 text-slate-600'}`}>對手發球</button>
                </div>
              </div>
            </div>
            <div>
              <label className="block text-sm font-bold text-slate-700 mb-3">設定先發 1~6 號位站位 (以對手在上方視角)</label>
              <div className="bg-blue-50/50 p-6 rounded-xl border border-blue-100 relative">
                <div className="absolute top-0 left-0 right-0 h-4 bg-[repeating-linear-gradient(45deg,transparent,transparent_5px,#cbd5e1_5px,#cbd5e1_10px)] border-b-2 border-slate-400 rounded-t-xl opacity-30"></div>
                <div className="text-center text-slate-400 font-mono text-xs tracking-widest font-bold mb-4 uppercase">Net (網子方向)</div>
                <div className="grid grid-cols-3 gap-4 max-w-lg mx-auto relative z-10">
                  {renderPlayerSelect("P4 左前排", setupForm.courtPositions.p4, "p4", handleSetupPosChange)}
                  {renderPlayerSelect("P3 中前排", setupForm.courtPositions.p3, "p3", handleSetupPosChange)}
                  {renderPlayerSelect("P2 右前排", setupForm.courtPositions.p2, "p2", handleSetupPosChange)}
                  {renderPlayerSelect("P5 左後排", setupForm.courtPositions.p5, "p5", handleSetupPosChange)}
                  {renderPlayerSelect("P6 中後排", setupForm.courtPositions.p6, "p6", handleSetupPosChange)}
                  {renderPlayerSelect("P1 右後排 (發球)", setupForm.courtPositions.p1, "p1", handleSetupPosChange)}
                </div>
                <div className="mt-6 pt-5 border-t border-blue-200/60">
                  <div className="mb-3"><span className="text-sm font-bold text-slate-700">配置自由球員與替補名單</span></div>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                    {renderPlayerSelect("Libero (自由球員)", setupForm.courtPositions.l1, "l1", handleSetupPosChange)}
                    {renderPlayerSelect("替補 1", setupForm.courtPositions.b1, "b1", handleSetupPosChange)}
                    {renderPlayerSelect("替補 2", setupForm.courtPositions.b2, "b2", handleSetupPosChange)}
                    {renderPlayerSelect("替補 3", setupForm.courtPositions.b3, "b3", handleSetupPosChange)}
                    {renderPlayerSelect("替補 4", setupForm.courtPositions.b4, "b4", handleSetupPosChange)}
                    {renderPlayerSelect("替補 5", setupForm.courtPositions.b5, "b5", handleSetupPosChange)}
                  </div>
                </div>
              </div>
            </div>
            <div className="pt-4 flex justify-end space-x-3 border-t">
              <button onClick={goDashboard} className="px-6 py-2.5 text-slate-600 font-medium hover:bg-slate-100 rounded-lg">取消並返回</button>
              <button onClick={startMatch} className="px-6 py-2.5 rounded-lg font-bold flex items-center transition bg-blue-600 hover:bg-blue-700 text-white shadow-md">開始錄製數據 <ArrowRight className="ml-2 w-4 h-4" /></button>
            </div>
          </div>
        </div>
      );

      const renderNextSetSetup = () => {
        if (!nextSetSetup || !matchState) return null;
        return (
          <div className="p-6 max-w-4xl mx-auto mt-6 bg-white rounded-xl shadow-sm border border-slate-200 mb-10">
            <h2 className="text-2xl font-bold mb-2 border-b pb-4">第 {matchState.currentSet + 1} 局 陣型配置</h2>
            <p className="text-sm text-slate-500 mb-6">目前發球方：<span className="font-bold text-blue-600">{nextSetSetup.serveTeam === 'us' ? '我方發球' : '對手發球'}</span> (已自動套用預設輪轉)</p>

            <div className="bg-blue-50/50 p-6 rounded-xl border border-blue-100 relative mb-6">
              <div className="absolute top-0 left-0 right-0 h-4 bg-[repeating-linear-gradient(45deg,transparent,transparent_5px,#cbd5e1_5px,#cbd5e1_10px)] border-b-2 border-slate-400 rounded-t-xl opacity-30"></div>
              <div className="text-center text-slate-400 font-mono text-xs tracking-widest font-bold mb-4 uppercase">Net (網子方向)</div>
              <div className="grid grid-cols-3 gap-4 max-w-lg mx-auto relative z-10">
                {renderPlayerSelect("P4 左前排", nextSetSetup.courtPositions.p4, "p4", handleNextSetPosChange)}
                {renderPlayerSelect("P3 中前排", nextSetSetup.courtPositions.p3, "p3", handleNextSetPosChange)}
                {renderPlayerSelect("P2 右前排", nextSetSetup.courtPositions.p2, "p2", handleNextSetPosChange)}
                {renderPlayerSelect("P5 左後排", nextSetSetup.courtPositions.p5, "p5", handleNextSetPosChange)}
                {renderPlayerSelect("P6 中後排", nextSetSetup.courtPositions.p6, "p6", handleNextSetPosChange)}
                {renderPlayerSelect("P1 右後排 (發球)", nextSetSetup.courtPositions.p1, "p1", handleNextSetPosChange)}
              </div>
              <div className="mt-6 pt-5 border-t border-blue-200/60">
                <div className="mb-3"><span className="text-sm font-bold text-slate-700">配置自由球員與替補名單</span></div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                  {renderPlayerSelect("Libero (自由球員)", nextSetSetup.courtPositions.l1, "l1", handleNextSetPosChange)}
                  {renderPlayerSelect("替補 1", nextSetSetup.courtPositions.b1, "b1", handleNextSetPosChange)}
                  {renderPlayerSelect("替補 2", nextSetSetup.courtPositions.b2, "b2", handleNextSetPosChange)}
                  {renderPlayerSelect("替補 3", nextSetSetup.courtPositions.b3, "b3", handleNextSetPosChange)}
                  {renderPlayerSelect("替補 4", nextSetSetup.courtPositions.b4, "b4", handleNextSetPosChange)}
                  {renderPlayerSelect("替補 5", nextSetSetup.courtPositions.b5, "b5", handleNextSetPosChange)}
                </div>
              </div>
            </div>
            <div className="pt-4 flex justify-end border-t">
              <button onClick={startNextSet} className="px-8 py-3 rounded-lg font-bold flex items-center transition bg-blue-600 hover:bg-blue-700 text-white shadow-lg text-lg">開局 <ArrowRight className="ml-2 w-5 h-5" /></button>
            </div>
          </div>
        );
      };

      const renderMatchRecorder = () => {
        if (!matchState) return null;
