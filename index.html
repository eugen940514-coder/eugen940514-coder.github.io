        const { starters, matchRoster, libero } = matchState;
        const activeIds = [...Object.values(starters).map(p => p?.id), libero?.id].filter(Boolean);
        const benchPlayers = (matchRoster || []).filter(p => !activeIds.includes(p.id));
        const liberoOnCourtPos = libero ? Object.keys(starters).find(pos => starters[pos]?.id === libero.id) : null;
        const isLiberoOnCourt = !!liberoOnCourtPos;

        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 p-4 flex flex-col">
            <div className="bg-slate-800 rounded-xl p-4 flex justify-between items-center mb-4 border border-slate-700 shadow-xl relative z-0">
              <div className="flex items-center space-x-4 w-1/4">
                <button onClick={handleSaveAndExit} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center transition shadow-md border border-slate-600"><SaveAll className="w-4 h-4 mr-2 text-blue-400" /> 儲存並離開</button>
                <div className="flex flex-col ml-2"><span className="text-xl font-bold tracking-wider text-blue-300">Set {matchState.currentSet}</span><span className="text-[10px] text-slate-400 font-medium tracking-widest uppercase">局數 {matchState.setsUs} : {matchState.setsThem}</span></div>
              </div>
              <div className="flex items-center justify-center space-x-12 text-4xl font-black font-mono w-1/2">
                <div className={`flex flex-col items-center ${matchState.serveTeam === 'us' ? 'text-blue-400' : 'text-slate-500'}`}><span className="text-sm font-normal mb-1 font-sans">我方 {matchState.serveTeam === 'us' && '🏐'}</span><span>{matchState.score.us}</span></div>
                <span className="text-slate-700 pb-4">:</span>
                <div className={`flex flex-col items-center ${matchState.serveTeam === 'them' ? 'text-red-400' : 'text-slate-500'}`}><span className="text-sm font-normal mb-1 font-sans">{matchState.opponent} {matchState.serveTeam === 'them' && '🏐'}</span><span>{matchState.score.them}</span></div>
              </div>
              <div className="flex space-x-3 items-center justify-end w-1/4">
                <button onClick={() => setShowTimeoutModal(true)} className="px-4 py-2 bg-slate-700 text-sm font-bold rounded hover:bg-slate-600 transition shadow">暫停</button>
                <button onClick={() => { setSubForm({ posOut: '', playerInId: '' }); setShowSubModal(true); }} className="px-4 py-2 bg-slate-700 text-sm font-bold rounded hover:bg-slate-600 transition shadow">換人</button>
                <button onClick={() => { setSubForm({ posOut: '', playerInId: '' }); setShowLiberoModal(true); }} className="px-4 py-2 bg-slate-700 text-sm font-bold rounded hover:bg-slate-600 transition shadow flex items-center"><Repeat className="w-4 h-4 mr-1" />L 交換</button>
              </div>
            </div>

            <div className="flex flex-1 gap-4 overflow-hidden relative z-0">
              <div className="w-2/3 flex flex-col gap-4">

                {showOpponentActions && (
                  <div className="bg-slate-800 rounded-xl p-3 flex flex-col gap-3 border border-slate-700 animate-in fade-in slide-in-from-top-2">
                    <div className="flex items-center gap-2"><span className="text-xs text-slate-400 font-bold w-16">對手回球:</span><button onClick={() => handleSpecialAction('opponent', '強扣')} className="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-1.5 rounded-lg text-sm transition border border-slate-600">對手強扣</button><button onClick={() => handleSpecialAction('opponent', '輕吊/處理')} className="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-1.5 rounded-lg text-sm transition border border-slate-600">對手輕吊/處理球</button></div>
                    <div className="flex flex-wrap items-center gap-2"><span className="text-xs text-slate-400 font-bold w-16">直接結束:</span><button onClick={() => handleSpecialAction('opponent', '失誤/出界', 'us')} className="bg-emerald-900/40 text-emerald-300 border border-emerald-800 hover:bg-emerald-800/60 px-4 py-1.5 rounded-lg text-sm transition hover:text-white">對手失誤 (我方得分)</button></div>
                  </div>
                )}

                <div className={`bg-gradient-to-b from-blue-900/30 to-slate-800/50 border-2 rounded-xl p-6 relative flex-1 flex flex-col justify-center items-center transition-all ${currentPhase === 'opponent_transition' ? 'border-slate-700/50 opacity-50 grayscale-[30%]' : 'border-blue-800/50 shadow-inner'}`}>
                  <div className="absolute top-2 left-0 right-0 text-center text-blue-400/50 font-mono text-xs tracking-widest uppercase font-bold">Net (網子方向)</div>
                  <div className="absolute top-6 left-1/2 -translate-x-1/2 w-[80%] h-1 bg-white/20 rounded-full shadow-[0_0_10px_rgba(255,255,255,0.3)]"></div>
                  <div className="grid grid-cols-3 gap-x-12 gap-y-10 w-[80%] max-w-lg mt-8">
                    {[{ p: starters.p4, posLabel: "P4" }, { p: starters.p3, posLabel: "P3" }, { p: starters.p2, posLabel: "P2" }, { p: starters.p5, posLabel: "P5" }, { p: starters.p6, posLabel: "P6" }, { p: starters.p1, posLabel: "P1" }].map(({ p, posLabel }) => renderPlayerCourtNode(p, posLabel))}
                  </div>
                </div>

                <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 min-h-[240px] flex flex-col justify-center transition-all shadow-lg relative">
                  {currentPhase === 'opponent_transition' ? (
                    <div className="animate-in fade-in zoom-in-95 duration-200 w-full flex flex-col items-center">
                      <h4 className="text-xl font-bold text-red-400 mb-6 flex items-center justify-center border-b border-slate-700 pb-4 w-full">
                        <Zap className="w-6 h-6 mr-2" /> 對手進攻階段
                      </h4>
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-4 w-full max-w-2xl">
                        <button onClick={() => handleSpecialAction('opponent', '強扣')} className="py-6 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-xl text-lg font-bold text-white transition shadow-sm">對手強扣</button>
                        <button onClick={() => handleSpecialAction('opponent', '輕吊/處理')} className="py-6 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-xl text-lg font-bold text-white transition shadow-sm">對手輕吊/處理</button>
                        <button onClick={() => handleSpecialAction('opponent', '失誤/出界', 'us')} className="py-6 bg-emerald-900/40 hover:bg-emerald-800/80 border border-emerald-800 text-emerald-300 rounded-xl text-lg font-bold transition shadow-sm hover:text-white">對手失誤 (我方得分)</button>
                      </div>
                    </div>
                  ) : currentPhase === 'us_receive_waiting' && !actionBuilder.player ? (
                    <div className="text-center flex flex-col items-center animate-in fade-in py-6">
                      <p className="font-bold text-xl text-slate-300 tracking-wide mb-4">等待接發球...</p>
                      <button onClick={() => handleSpecialAction('opponent', '發球失誤', 'us')} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg transition border border-emerald-500 mt-2">對手發球失誤 (我方直接得分)</button>
                    </div>
                  ) : !actionBuilder.player ? (
                    <div className="text-center flex flex-col items-center animate-in fade-in">
                      {currentPhase === 'us_blocking_sequence' ? (
                        <>
                          <p className="font-medium text-lg text-slate-300 mb-4">已記錄 <span className="text-blue-400 font-bold text-xl">{(pendingBlockGroup || []).length}</span> 名攔網者。<br /><span className="text-sm mt-2 block text-slate-400">點選球場新增，或點擊結算</span></p>
                          {(() => {
                            const hasStuff = (pendingBlockGroup || []).some(b => b.result?.id === 'stuff');
                            const hasError = (pendingBlockGroup || []).some(b => b.result?.id === 'error');
                            const hasTouchOut = (pendingBlockGroup || []).some(b => b.result?.id === 'touch_out');
                            let resolveText = '完成攔網結算 (比賽繼續)';
                            let btnColor = 'bg-slate-600 hover:bg-slate-500 border-slate-500 text-white';
                            if (hasError || hasTouchOut) { resolveText = '攔網觸網/越位/出界 (對方得分)'; btnColor = 'bg-rose-600 hover:bg-rose-500 border-rose-400 text-white shadow-[0_0_15px_rgba(225,29,72,0.5)]'; }
                            else if (hasStuff) { resolveText = (pendingBlockGroup || []).length === 1 ? '單人攔死得分 (結算)' : '多人攔死得分 (結算)'; btnColor = 'bg-emerald-600 hover:bg-emerald-500 border-emerald-400 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)]'; }
                            return <button onClick={() => resolveBlockGroupData(pendingBlockGroup)} className={`px-8 py-3 rounded-xl font-bold text-lg border transition mt-2 ${btnColor}`}>{resolveText}</button>;
                          })()}
                        </>
                      ) : currentPhase === 'us_defense' ? (
                        <div className="py-6 w-full flex justify-center animate-in fade-in flex-col items-center">
                          <p className="font-bold text-xl text-slate-300 tracking-wide mb-4">對手攻擊！等待防守/攔網...</p>
                          <div className="flex gap-3">
                            <button onClick={() => handleSpecialAction('system', '無人防守落地', 'them')} className="px-6 py-4 bg-rose-900/30 hover:bg-rose-800/80 border border-rose-800/50 text-rose-300 hover:text-white rounded-xl text-sm font-bold transition flex items-center justify-center"><ShieldAlert className="w-4 h-4 mr-2" /> 空檔落地失分 (不計個人失誤)</button>
                          </div>
                        </div>
                      ) : (
                        <div className="py-10"><span className="opacity-50">請點擊場上球員...</span></div>
                      )}
                    </div>
                  ) : !actionBuilder.actionType ? (
                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-200">
                      <div className="text-sm text-slate-400 mb-4 flex items-center pb-2 border-b border-slate-700">選定：<span className="text-white font-bold mx-2 px-3 py-1 bg-blue-600/50 border border-blue-500 rounded text-base tracking-wide">#{actionBuilder.player.number} {actionBuilder.player.name}</span> <span className="ml-2">動作？</span></div>
                      <div className={`grid ${availableActionKeys.length <= 2 ? 'grid-cols-2' : 'grid-cols-3'} gap-3`}>
                        {availableActionKeys.map(key => (
                          <button key={key} onClick={() => handleActionTypeClick(key)} className="py-4 bg-slate-700/80 hover:bg-blue-600 border border-slate-600 hover:border-blue-400 rounded-xl text-base font-bold text-white transition shadow-sm">{actionTypes[key].label}</button>
                        ))}
                      </div>
                      <button onClick={() => setActionBuilder({ player: null, actionType: null, blockQuality: null })} className="absolute top-4 right-4 text-slate-500 hover:text-white p-2"><X className="w-5 h-5" /></button>
                    </div>
                  ) : actionBuilder.actionType === 'Block' && !actionBuilder.blockQuality ? (
                    <div className="animate-in fade-in slide-in-from-right-4 duration-200">
                      <div className="text-sm text-slate-400 mb-4 flex items-center pb-2 border-b border-slate-700"><span className="text-white font-bold mr-2">#{actionBuilder.player.number} {actionBuilder.player.name}</span> 的 <span className="text-blue-400 font-bold ml-2 text-lg">攔網品質</span> 是？</div>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        {blockQualityOptions.map(opt => <button key={opt.id} onClick={() => handleBlockQualityClick(opt)} className="py-6 bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 rounded-xl font-bold text-white shadow-sm text-base transition">{opt.label}</button>)}
                      </div>
                      <button onClick={() => setActionBuilder({ ...actionBuilder, actionType: null, blockQuality: null })} className="mt-5 text-sm text-blue-400 hover:text-blue-300 font-medium flex items-center"><ArrowRight className="w-4 h-4 mr-1 rotate-180" /> 返回重新選擇動作</button>
                    </div>
                  ) : (
                    <div className="animate-in fade-in slide-in-from-right-4 duration-200">
                      <div className="text-sm text-slate-400 mb-4 flex items-center pb-2 border-b border-slate-700"><span className="text-white font-bold mr-2">#{actionBuilder.player.number} {actionBuilder.player.name}</span> 的 <span className="text-blue-400 font-bold ml-2 text-lg">{actionTypes[actionBuilder.actionType].label}</span> 結果？</div>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {(() => {
                          let opts = actionTypes[actionBuilder.actionType].options;
                          if (actionBuilder.actionType === 'Block' && (pendingBlockGroup || []).length > 0) {
                            // 防呆邏輯：如果已有隊員選了「結算類」結果，則後續隊員只能選「無觸球」或「有效觸球」
                            const hasTerminal = pendingBlockGroup.some(b => ['stuff', 'rebound_to_opponent', 'touch_out', 'error'].includes(b.result?.id));
                            if (hasTerminal) {
                              opts = opts.filter(opt => ['no_touch', 'touch'].includes(opt.id));
                            }
                          }
                          return opts.map(opt => {
                            let bc = "bg-slate-700 hover:bg-slate-600 border-slate-600 text-white";
                            if (opt.point === 'us' || opt.id === 'kill') bc = "bg-emerald-900/40 hover:bg-emerald-600 text-emerald-100 border-emerald-700";
                            if (opt.point === 'them') bc = "bg-rose-900/40 hover:bg-rose-600 text-rose-100 border-rose-700";
                            return <button key={opt.id} onClick={() => handleResultClick(opt)} className={`py-6 rounded-xl font-bold transition border-2 shadow-sm text-base ${bc}`}>{opt.label}</button>;
                          });
                        })()}
                      </div>
                      <button onClick={() => setActionBuilder({ ...actionBuilder, actionType: null, blockQuality: null })} className="mt-5 text-sm text-blue-400 hover:text-blue-300 font-medium flex items-center"><ArrowRight className="w-4 h-4 mr-1 rotate-180" /> 返回重新選擇動作</button>
                    </div>
                  )}
                </div>
              </div>

              <div className="w-1/3 bg-slate-800 rounded-xl border border-slate-700 flex flex-col overflow-hidden shadow-xl">
                <div className="p-4 bg-slate-900/80 border-b border-slate-700 flex justify-between items-center">
                  <h3 className="font-bold flex items-center text-slate-200"><History className="w-4 h-4 mr-2 text-blue-400" /> 回合行為記錄</h3>
                  <button onClick={undoSingleLastAction} disabled={(currentRally || []).length === 0 && (pendingBlockGroup || []).length === 0} className="text-slate-400 hover:text-white disabled:opacity-30 transition p-1.5 bg-slate-800 rounded hover:bg-slate-700 border border-slate-700" title="撤銷最後一個動作"><RotateCcw className="w-4 h-4" /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-900/20">
                  {[...(currentRally || []), ...(pendingBlockGroup || [])].length === 0 ? (
                    <div className="flex flex-col items-center justify-center h-full text-slate-500 opacity-60"><RotateCcw className="w-8 h-8 mb-2" /><p className="text-sm font-medium">等待記錄第一球...</p></div>
                  ) : (
                    [...(currentRally || []), ...(pendingBlockGroup || [])].map((a, i) => (
                      <div key={a.id} className="flex flex-col bg-slate-800 p-3 rounded-lg border border-slate-700 border-l-4 border-l-blue-500 shadow-sm animate-in fade-in slide-in-from-right-2">
                        <span className="text-slate-500 text-[10px] font-mono mb-1.5">{a.timestamp} | Event {i + 1}</span>
                        <div className="flex items-center flex-wrap gap-2">
                          <span className="font-bold text-white text-sm bg-slate-700 px-2 py-0.5 rounded">{a.player.number !== '-' ? `#${a.player.number} ${a.player.name}` : a.player.name}</span>
                          <span className="text-blue-300 font-medium text-sm flex items-center">{getActionCategoryLabel(a.actionCategory)}{a.blockQuality && <span className="text-xs text-slate-400 ml-1">({a.blockQuality.label.split('.')[1].trim()})</span>}</span>
                          <span className={`px-2 py-0.5 rounded text-xs font-bold ${a.result.point === 'us' || a.result.id === 'kill' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : a.result.point === 'them' ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-slate-600 text-slate-300'}`}>{a.result.label}</span>
                        </div>
                      </div>
                    ))
                  )}
                </div>
                <div className="p-4 bg-slate-900 border-t border-slate-700">
                  <button onClick={handleRevertOrUndo} disabled={(currentRally || []).length === 0 && (pendingBlockGroup || []).length === 0 && (matchState.history || []).length === 0} className="w-full bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed border border-slate-600 text-slate-300 py-3 rounded-xl text-sm font-bold transition flex items-center justify-center"><RotateCcw className="w-5 h-5 mr-2" /> 返回上一分 (清空/撤回)</button>
                </div>
              </div>
            </div>

            {/* Modals for Recorder */}
            {showEndSetModal && endSetInfo && (
              <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center backdrop-blur-sm">
                <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-96 shadow-2xl animate-in zoom-in-95 flex flex-col items-center relative">
                  <div className="bg-slate-900 p-4 rounded-full mb-4 shadow-inner">{endSetInfo.winner === 'us' ? <CheckCircle className="w-14 h-14 text-emerald-400" /> : <XCircle className="w-14 h-14 text-rose-500" />}</div>
                  <h3 className="text-2xl font-bold text-white mb-2">第 {matchState.currentSet} 局結束</h3>
                  <p className="text-5xl font-black font-mono tracking-widest mb-6"><span className={endSetInfo.winner === 'us' ? 'text-emerald-400' : 'text-slate-400'}>{endSetInfo.scoreUs}</span><span className="text-slate-500 mx-3">-</span><span className={endSetInfo.winner === 'them' ? 'text-rose-400' : 'text-slate-400'}>{endSetInfo.scoreThem}</span></p>

                  {(() => {
                    const winningSetsRequired = matchState.matchFormat === 3 ? 2 : 3;
                    const isMatchOver = (matchState.setsUs === winningSetsRequired) || (matchState.setsThem === winningSetsRequired);

                    if (isMatchOver) {
                      return (
                        <div className="w-full text-center mt-2">
                          <div className="flex items-center justify-center text-yellow-400 mb-4"><Trophy className="w-6 h-6 mr-2" /><h4 className="text-2xl font-bold">比賽結束 (Match Over)</h4></div>
                          <button onClick={handleSaveAndExit} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-bold text-lg transition shadow-[0_0_15px_rgba(59,130,246,0.5)] border border-blue-500 flex items-center justify-center"><SaveAll className="w-5 h-5 mr-2" /> 儲存並返回主畫面</button>
                        </div>
                      );
                    } else {
                      return (
                        <div className="w-full mt-2">
                          <h4 className="text-sm font-bold text-slate-400 mb-3 text-center tracking-wider">請點擊按鈕進入第 {matchState.currentSet + 1} 局陣型設定：</h4>
                          <div className="flex gap-3">
                            <button onClick={() => handleGotoNextSet('us')} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-bold transition shadow-lg border border-blue-500 text-lg">我方發球</button>
                            <button onClick={() => handleGotoNextSet('them')} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3.5 rounded-xl font-bold transition shadow-lg border border-red-500 text-lg">對手發球</button>
                          </div>
                          <button onClick={handleRevertOrUndo} className="mt-5 w-full text-slate-500 hover:text-slate-300 py-2 font-medium text-sm transition border border-dashed border-slate-600 rounded-lg">取消 (分數記錯，返回修改)</button>
                        </div>
                      );
                    }
                  })()}
                </div>
              </div>
            )}

            {showTimeoutModal && (
              <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center backdrop-blur-sm">
                <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 w-80 shadow-2xl animate-in fade-in zoom-in-95">
                  <h3 className="text-lg font-bold mb-4 text-white flex items-center"><RotateCcw className="w-5 h-5 mr-2 text-yellow-400" />請求暫停 (Timeout)</h3>
                  <p className="text-sm text-slate-300 mb-5 bg-slate-900 p-3 rounded-lg text-center font-mono">紀錄比分 {matchState.score.us} : {matchState.score.them}</p>
                  <div className="flex gap-3">
                    <button onClick={() => handleTimeout('us')} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold transition border border-blue-500">我方暫停</button>
                    <button onClick={() => handleTimeout('them')} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-bold transition border border-red-500">對手暫停</button>
                  </div>
                  <button onClick={() => setShowTimeoutModal(false)} className="mt-4 w-full text-slate-400 hover:text-white py-2 font-medium">取消</button>
                </div>
              </div>
            )}

            {showSubModal && (
              <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center backdrop-blur-sm">
                <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 w-96 shadow-2xl animate-in fade-in zoom-in-95">
                  <h3 className="text-lg font-bold mb-5 text-white flex items-center"><Users className="w-5 h-5 mr-2 text-blue-400" />球員替換 (Substitution)</h3>
                  <div className="space-y-5">
                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                      <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">下場球員 (退場)</label>
                      <select value={subForm.posOut} onChange={e => setSubForm({ ...subForm, posOut: e.target.value })} className="w-full p-2.5 bg-slate-700 text-white rounded outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 font-medium">
                        <option value="">請選擇下場球員...</option>
                        {Object.entries(matchState.starters).map(([pos, p]) => <option key={pos} value={pos}>{pos.toUpperCase()}號位 - #{p?.number} {p?.name}</option>)}
                      </select>
                    </div>
                    <div className="flex justify-center -my-3 relative z-10"><div className="bg-slate-700 p-1.5 rounded-full border-2 border-slate-800 shadow-sm"><RotateCcw className="w-4 h-4 text-emerald-400 rotate-90" /></div></div>
                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                      <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">上場球員 (入替)</label>
                      <select value={subForm.playerInId} onChange={e => setSubForm({ ...subForm, playerInId: e.target.value })} className="w-full p-2.5 bg-slate-700 text-white rounded outline-none focus:ring-2 focus:ring-emerald-500 border border-slate-600 font-medium">
                        <option value="">請選擇上場球員...</option>
                        {benchPlayers.length > 0 ? benchPlayers.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name} ({p.positions.join(',')})</option>) : <option value="" disabled>目前板凳區無替補</option>}
                      </select>
                    </div>
                  </div>
                  <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                    <button onClick={() => { setShowSubModal(false); setSubForm({ posOut: '', playerInId: '' }); }} className="px-5 py-2.5 text-slate-400 hover:text-white font-medium transition">取消</button>
                    <button onClick={handleSubSubmit} disabled={!subForm.posOut || !subForm.playerInId} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-lg">確認替換</button>
                  </div>
                </div>
              </div>
            )}

            {showLiberoModal && (
              <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center backdrop-blur-sm">
                <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 w-96 shadow-2xl animate-in fade-in zoom-in-95">
                  <h3 className="text-lg font-bold mb-5 text-white flex items-center"><Repeat className="w-5 h-5 mr-2 text-blue-400" />自由球員交換 (Libero)</h3>

                  {!libero ? (
                    <div className="text-center py-6 text-slate-400 font-medium">尚未於賽前登錄自由球員</div>
                  ) : isLiberoOnCourt ? (
                    <div className="space-y-5">
                      <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">下場球員 (退場)</label>
                        <div className="w-full p-2.5 bg-slate-700 text-white rounded border border-slate-600 opacity-60 font-medium">
                          {liberoOnCourtPos.toUpperCase()}號位 - #{libero.number} {libero.name} (L)
                        </div>
                      </div>
                      <div className="flex justify-center -my-3 relative z-10"><div className="bg-slate-700 p-1.5 rounded-full border-2 border-slate-800 shadow-sm"><RotateCcw className="w-4 h-4 text-emerald-400 rotate-90" /></div></div>
                      <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">上場球員 (入替)</label>
                        <select value={subForm.playerInId} onChange={e => setSubForm({ ...subForm, playerInId: e.target.value })} className="w-full p-2.5 bg-slate-700 text-white rounded outline-none focus:ring-2 focus:ring-emerald-500 border border-slate-600 font-medium">
                          <option value="">請選擇回到場上的後排選手...</option>
                          {benchPlayers.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
                        </select>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-5">
                      <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">下場球員 (退場)</label>
                        <select value={subForm.posOut} onChange={e => setSubForm({ ...subForm, posOut: e.target.value })} className="w-full p-2.5 bg-slate-700 text-white rounded outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 font-medium">
                          <option value="">請選擇被替換下場的後排選手...</option>
                          {Object.entries(starters).filter(([pos]) => ['p1', 'p5', 'p6'].includes(pos)).map(([pos, p]) => <option key={pos} value={pos}>{pos.toUpperCase()}號位 - #{p?.number} {p?.name}</option>)}
                        </select>
                      </div>
                      <div className="flex justify-center -my-3 relative z-10"><div className="bg-slate-700 p-1.5 rounded-full border-2 border-slate-800 shadow-sm"><RotateCcw className="w-4 h-4 text-emerald-400 rotate-90" /></div></div>
                      <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <label className="block text-xs font-bold text-slate-400 mb-2 tracking-wider">上場球員 (入替)</label>
                        <div className="w-full p-2.5 bg-slate-700 text-white rounded border border-slate-600 opacity-60 font-medium">
                          #{libero.number} {libero.name} (L)
                        </div>
                      </div>
                    </div>
                  )}
                  <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                    <button onClick={() => { setShowLiberoModal(false); setSubForm({ posOut: '', playerInId: '' }); }} className="px-5 py-2.5 text-slate-400 hover:text-white font-medium transition">取消</button>
                    <button onClick={handleLiberoSubmit} disabled={isLiberoOnCourt ? !subForm.playerInId : !subForm.posOut} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-lg">確認交換</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderMatchReport = () => {
        if (!matchState) return null;

        // --- 數據統計運算 ---
        const receiveStats = {};
        const attackStats = {};
        const serveStats = {};
        const setStats = {};
        const setDist = {};
        const digStats = {};

        let teamReceiveStats = { total: 0, perfect: 0, good: 0, bad: 0, error: 0, score: 0 };
        let teamAttackStats = { total: 0, kill: 0, in_play: 0, blocked_dead: 0, error: 0 };
        let teamServeStats = { total: 0, ace: 0, in: 0, error: 0 };
        let teamSetStats = { total: 0, perfect: 0, good: 0, bad: 0, error: 0 };
        let teamSetDist = { OH: 0, MB: 0, OPP: 0, BackRow: 0, Setter: 0, totalAttacks: 0 };
        let teamDigStats = { total: 0, perfect: 0, good: 0, bad: 0, error: 0, score: 0 };
        let teamBlockStats = { stuffs: 0 };
        const totalSets = (matchState.setScores || []).length + ((!matchState.isMatchOver && (matchState.score?.us > 0 || matchState.score?.them > 0)) ? 1 : 0);

        // 按局數彙整得失分來源
        const perSetSummaries = [];
        for (let sn = 1; sn <= totalSets; sn++) {
          perSetSummaries.push({
            setNum: sn,
            us: { attack: 0, serve: 0, block: 0, oppServeError: 0, oppError: 0, total: 0 },
            them: { attackError: 0, attackBlocked: 0, serveError: 0, receiveError: 0, blockError: 0, defenseError: 0, oppKill: 0, total: 0 }
          });
        }

        (matchState.history || []).forEach(rally => {
          const sn = rally.setNum;
          if (sn < 1 || sn > totalSets) return;
          const summary = perSetSummaries[sn - 1];

          const actions = rally.actions || [];
          for (let i = 0; i < actions.length; i++) {
            const act = actions[i];
            const pId = act.player?.id;
            
            // 基礎統計過濾 (僅在全場或符合局數時統計)
            const shouldStat = (reportSetFilter === 'all') || 
                               (reportSetFilter === 'last' && sn === totalSets) || 
                               (parseInt(reportSetFilter) === sn);

            if (shouldStat) {
              if (!pId) continue;

              // 1. 接發球統計
              if (act.actionCategory === 'Receive') {
                if (!receiveStats[pId]) receiveStats[pId] = { name: act.player.name, number: act.player.number, total: 0, perfect: 0, good: 0, bad: 0, error: 0, score: 0 };
                const s = receiveStats[pId];
                s.total++; teamReceiveStats.total++;
                if (act.result.id === 'perfect' || act.result.id === 'kill') { s.perfect++; teamReceiveStats.perfect++; s.score += 3; teamReceiveStats.score += 3; }
                else if (act.result.id === 'good') { s.good++; teamReceiveStats.good++; s.score += 2; teamReceiveStats.score += 2; }
                else if (act.result.id === 'bad') { s.bad++; teamReceiveStats.bad++; s.score += 1; teamReceiveStats.score += 1; }
                else if (act.result.id === 'error') { s.error++; teamReceiveStats.error++; }
              } 
              // 2. 攻擊統計
              else if (act.actionCategory === 'Attack' || act.actionCategory === 'BackRowAttack') {
                if (!attackStats[pId]) attackStats[pId] = { name: act.player.name, number: act.player.number, total: 0, kill: 0, in_play: 0, blocked_dead: 0, error: 0 };
                const s = attackStats[pId];
                s.total++; teamAttackStats.total++;
                if (act.result.id === 'kill') { s.kill++; teamAttackStats.kill++; }
                else if (act.result.id === 'in_play' || act.result.id === 'blocked_rebound') { s.in_play++; teamAttackStats.in_play++; }
                else if (act.result.id === 'blocked_dead' || act.result.id === 'blocked' || act.result.id === 'touch_out') { s.blocked_dead++; teamAttackStats.blocked_dead++; }
                else if (act.result.id === 'error') { s.error++; teamAttackStats.error++; }
              }
              // 3. 發球統計
              else if (act.actionCategory === 'Serve') {
                if (!serveStats[pId]) serveStats[pId] = { name: act.player.name, number: act.player.number, total: 0, ace: 0, in: 0, error: 0 };
                const s = serveStats[pId];
                s.total++; teamServeStats.total++;
                if (act.result.id === 'ace') { s.ace++; teamServeStats.ace++; }
                else if (act.result.id === 'in') { s.in++; teamServeStats.in++; }
                else if (act.result.id === 'error') { s.error++; teamServeStats.error++; }
              }

              // 4. 舉球狀況與佔比統計
              else if (act.actionCategory === 'Set') {
                if (!setStats[pId]) setStats[pId] = { name: act.player.name, number: act.player.number, total: 0, perfect: 0, good: 0, bad: 0, error: 0 };
                const s = setStats[pId];
                s.total++; teamSetStats.total++;
                if (act.result.id === 'perfect') { s.perfect++; teamSetStats.perfect++; }
                else if (act.result.id === 'good') { s.good++; teamSetStats.good++; }
                else if (act.result.id === 'bad') { s.bad++; teamSetStats.bad++; }
                else if (act.result.id === 'error') { s.error++; teamSetStats.error++; }

                if (!setDist[pId]) setDist[pId] = { name: act.player.name, number: act.player.number, positions: act.player.positions || [], OH: 0, MB: 0, OPP: 0, BackRow: 0, Setter: 0, totalAttacks: 0 };
                const d = setDist[pId];

                if (act.result.id === 'kill' || act.result.id === 'set_overpass') {
                  if (!act.player?.positions?.includes('L')) {
                    d.Setter++; d.totalAttacks++; teamSetDist.Setter++; teamSetDist.totalAttacks++;
                  }
                } else if (i + 1 < actions.length) {
                  const nextAct = actions[i + 1];
                  if (nextAct.actionCategory === 'Attack' || nextAct.actionCategory === 'BackRowAttack') {
                    const attackerPos = nextAct.player?.positions || [];
                    d.totalAttacks++; teamSetDist.totalAttacks++;
                    if (nextAct.actionCategory === 'BackRowAttack') { d.BackRow++; teamSetDist.BackRow++; }
                    else if (attackerPos.includes('S')) { d.OPP++; teamSetDist.OPP++; }
                    else if (attackerPos.includes('OH')) { d.OH++; teamSetDist.OH++; }
                    else if (attackerPos.includes('MB')) { d.MB++; teamSetDist.MB++; }
                    else if (attackerPos.includes('OPP')) { d.OPP++; teamSetDist.OPP++; }
                    else { d.OH++; teamSetDist.OH++; }
                  }
                }
              }
              // 5. 防守統計 (Dig)
              else if (act.actionCategory === 'Dig') {
                if (!digStats[pId]) digStats[pId] = { name: act.player.name, number: act.player.number, total: 0, perfect: 0, good: 0, bad: 0, error: 0 };
                const s = digStats[pId];
                s.total++; teamDigStats.total++;
                if (act.result.id === 'perfect') { s.perfect++; teamDigStats.perfect++; }
                else if (act.result.id === 'good') { s.good++; teamDigStats.good++; }
                else if (act.result.id === 'bad') { s.bad++; teamDigStats.bad++; }
                else if (act.result.id === 'error') { s.error++; teamDigStats.error++; }
              }
              // 6. 舉球員二次攻擊 (無 Set 動作直接 Attack)
              else if (act.actionCategory === 'Attack' && act.player?.positions?.includes('S') && !act.player?.positions?.includes('L')) {
                if (i === 0 || actions[i - 1].actionCategory !== 'Set') {
                  if (!setDist[pId]) setDist[pId] = { name: act.player.name, number: act.player.number, positions: act.player.positions || [], OH: 0, MB: 0, OPP: 0, BackRow: 0, Setter: 0, totalAttacks: 0 };
                  setDist[pId].Setter++; teamSetDist.Setter++;
                  setDist[pId].totalAttacks++; teamSetDist.totalAttacks++;
                }
              }

              // 6. 獨立攔網得分統計
              if (act.actionCategory === 'Block' && act.result?.id === 'stuff') {
                teamBlockStats.stuffs++;
              }
            }
          }

          // --- 不管 UI 篩選為何，背景先算好每一局的來源 ---
          const lastAct = actions[actions.length - 1];
          if (rally.winner === 'us') {
            summary.us.total++;
            if (!lastAct) { summary.us.oppError++; }
            else if (lastAct.actionCategory === 'Serve' && lastAct.result.id === 'ace') { summary.us.serve++; }
            else if (['Attack', 'BackRowAttack', 'Freeball'].includes(lastAct.actionCategory) && lastAct.result.id === 'kill') { summary.us.attack++; }
            else if (lastAct.actionCategory === 'Block' && lastAct.result.id === 'stuff') { summary.us.block++; }
            else if (lastAct.actionCategory === 'opponent') {
              if (lastAct.result.id === '發球失誤') summary.us.oppServeError++;
              else summary.us.oppError++;
            }
            else { summary.us.oppError++; }
          } else if (rally.winner === 'them') {
            summary.them.total++;
            if (!lastAct) { summary.them.oppKill++; }
            else if (lastAct.actionCategory === 'Serve' && lastAct.result.id === 'error') { summary.them.serveError++; }
            else if (['Attack', 'BackRowAttack'].includes(lastAct.actionCategory)) {
              if (lastAct.result.id === 'error') summary.them.attackError++;
              else if (lastAct.result.id === 'blocked_dead') summary.them.attackBlocked++;
              else summary.them.oppKill++;
            }
            else if (lastAct.actionCategory === 'Receive' && lastAct.result.id === 'error') { summary.them.receiveError++; }
            else if (lastAct.actionCategory === 'Block' && (lastAct.result.id === 'error' || lastAct.result.id === 'touch_out')) { summary.them.blockError++; }
            else if (lastAct.actionCategory === 'Dig' && (lastAct.result.id === 'error' || lastAct.result.point === 'them')) { summary.them.defenseError++; }
            else if (lastAct.actionCategory === 'opponent') { summary.them.oppKill++; }
            else { summary.them.oppKill++; }
          }
        });

        const receiveArray = Object.values(receiveStats).sort((a, b) => b.total - a.total);
        const attackArray = Object.values(attackStats).sort((a, b) => b.total - a.total);
        const serveArray = Object.values(serveStats).sort((a, b) => b.total - a.total);
        const setArray = Object.values(setStats).sort((a, b) => b.total - a.total);
        const setDistArray = Object.values(setDist).sort((a, b) => b.totalAttacks - a.totalAttacks);
        const digArray = Object.values(digStats).sort((a, b) => b.total - a.total);

        // 動態修復與計算歷史數據 (解決舊資料漏記比分或站位的問題)
        const processedHistory = (matchState.history || []).reduce((acc, rally, idx) => {
          // 比賽過程也同步篩選
          if (reportSetFilter !== 'all') {
            if (reportSetFilter === 'last') {
              if (rally.setNum !== totalSets) return acc;
            } else if (rally.setNum !== parseInt(reportSetFilter)) {
              return acc;
            }
          }

          let scoreUs = rally.scoreUs;
          let scoreThem = rally.scoreThem;
          
          // 如果缺少比分，根據前一球累加
          if (scoreUs === undefined || scoreThem === undefined) {
            const prev = acc[idx - 1];
            const prevUs = (prev && prev.setNum === rally.setNum) ? prev.scoreUs : 0;
            const prevThem = (prev && prev.setNum === rally.setNum) ? prev.scoreThem : 0;
            scoreUs = prevUs + (rally.winner === 'us' ? 1 : 0);
            scoreThem = prevThem + (rally.winner === 'them' ? 1 : 0);
          }
          
          // 如果缺少站位，優先使用備份的 prevStarters
          const starters = rally.starters || rally.prevStarters || {};
          
          acc.push({ ...rally, scoreUs, scoreThem, starters });
          return acc;
        }, []);

        return (
          <div className="min-h-screen bg-slate-100 text-slate-800 p-6 flex flex-col">
            <div className="max-w-5xl mx-auto w-full">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6 flex justify-between items-center relative">
                <div className="flex items-center">
                  <button onClick={goDashboard} className="bg-slate-100 p-2 rounded-lg text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition mr-4"><ArrowLeft className="w-6 h-6" /></button>
                  <div className="flex items-center gap-4">
                    <div>
                      <h1 className="text-2xl font-black text-slate-800 tracking-wide">對戰 {matchState.opponent}</h1>
                      <p className="text-slate-500 text-sm mt-1">{matchState.date} • {matchState.matchFormat === 3 ? '三局制' : '五局制'}</p>
                    </div>
                    <div className="flex flex-col gap-2 ml-4">
                      <div className="flex items-center gap-2">
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">檢討範圍:</span>
                        <select 
                          value={reportSetFilter} 
                          onChange={(e) => setReportSetFilter(e.target.value)}
                          className="text-xs bg-slate-100 border border-slate-200 rounded px-2 py-1 font-bold text-slate-600 outline-none focus:ring-1 focus:ring-blue-400 cursor-pointer"
                        >
                          <option value="all">全場總計 (All)</option>
                          {Array.from({ length: totalSets }).map((_, i) => (
                            <option key={i+1} value={String(i+1)}>第 {i+1} 局數據</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="flex items-center bg-slate-50 border border-slate-200 px-6 py-3 rounded-xl">
                  <div className="text-center mr-6 shrink-0">
                    <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-0.5">總局數</p>
                    <p className="text-2xl font-black font-mono text-blue-600 whitespace-nowrap flex items-center justify-center gap-2">
                      <span>{matchState.setsUs}</span>
                      <span className="text-slate-300 text-xl">:</span>
                      <span>{matchState.setsThem}</span>
                    </p>
                  </div>
                  <div className="w-px h-10 bg-slate-300 mx-4"></div>
                  <div className="text-sm font-medium text-slate-600 flex space-x-3">
                    {(matchState.setScores || []).map((s, i) => (<span key={i} className="bg-white px-2 py-1 rounded shadow-sm border border-slate-100">局{i + 1}: {s.us}-{s.them}</span>))}
                    {(!matchState.isMatchOver && (matchState.score?.us > 0 || matchState.score?.them > 0)) && (
                      <span className="bg-blue-50 text-blue-600 px-2 py-1 rounded shadow-sm border border-blue-100 font-bold">局{matchState.currentSet}: {matchState.score?.us}-{matchState.score?.them}</span>
                    )}
                  </div>
                </div>
              </div>

              <div className="flex flex-wrap gap-2 md:gap-3 mb-6 scrollbar-hide overflow-x-auto pb-2">
                <button onClick={() => setReportTab('overview')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'overview' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><BarChart2 className="w-4 h-4 mr-2" />基礎數據</button>
                <button onClick={() => setReportTab('process')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'process' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Activity className="w-4 h-4 mr-2" />比賽過程</button>
                <button onClick={() => setReportTab('receive')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'receive' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Target className="w-4 h-4 mr-2" />接發球狀況</button>
                <button onClick={() => setReportTab('dig')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'dig' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Shield className="w-4 h-4 mr-2" />防守狀況</button>
                <button onClick={() => setReportTab('attack')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'attack' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Zap className="w-4 h-4 mr-2" />攻擊狀況</button>
                <button onClick={() => setReportTab('serve')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'serve' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Play className="w-4 h-4 mr-2" />發球狀況</button>
                <button onClick={() => setReportTab('set')} className={`px-4 md:px-5 py-2.5 rounded-xl font-bold transition shadow-sm flex items-center shrink-0 text-sm ${reportTab === 'set' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}><Users className="w-4 h-4 mr-2" />舉球狀況</button>
              </div>

              {/* ===== 基礎數據 Overview Tab ===== */}
              {reportTab === 'overview' && (() => {
                const atkRate = teamAttackStats.total > 0 ? (teamAttackStats.kill / teamAttackStats.total * 100).toFixed(1) : '0.0';
                const recvGoodRate = teamReceiveStats.total > 0 ? ((teamReceiveStats.perfect + teamReceiveStats.good) / teamReceiveStats.total * 100).toFixed(1) : '0.0';
                const serveErrRate = teamServeStats.total > 0 ? (teamServeStats.error / teamServeStats.total * 100).toFixed(1) : '0.0';

                // 建構每局得分走勢資料
                const history = matchState.history || [];
                const setScores = matchState.setScores || [];
                const totalSetsCount = setScores.length + (matchState.score?.us > 0 || matchState.score?.them > 0 ? 1 : 0);
                const setProgressData = [];
                for (let sn = 1; sn <= totalSetsCount; sn++) {
                  // 如果有篩選，進程圖也只顯示該局
                  if (reportSetFilter !== 'all') {
                    if (reportSetFilter === 'last') {
                      if (sn !== totalSetsCount) continue;
                    } else if (sn !== parseInt(reportSetFilter)) {
                      continue;
                    }
                  }
                  
                  const setRallies = history.filter(r => r.setNum === sn);
                  const points = [{ us: 0, them: 0 }];
                  let scoreUs = 0, scoreThem = 0;
                  setRallies.forEach(r => {
                    if (r.winner === 'us') scoreUs++; else scoreThem++;
                    points.push({ us: scoreUs, them: scoreThem });
                  });
                  setProgressData.push({ setNum: sn, points });
                }



                return (
                  <div className="space-y-6 animate-in fade-in">
                    {/* 基礎數據卡片 */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 text-center">
                        <p className="text-xs font-bold text-slate-400 tracking-wider mb-2">攻擊成功率</p>
                        <p className="text-4xl font-black text-emerald-600">{atkRate}<span className="text-lg">%</span></p>
                        <p className="text-xs text-slate-400 mt-1">({teamAttackStats.kill}/{teamAttackStats.total})</p>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 text-center">
                        <p className="text-xs font-bold text-slate-400 tracking-wider mb-2">接發到位率</p>
                        <p className="text-4xl font-black text-blue-600">{recvGoodRate}<span className="text-lg">%</span></p>
                        <p className="text-xs text-slate-400 mt-1">({teamReceiveStats.perfect + teamReceiveStats.good}/{teamReceiveStats.total})</p>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 text-center">
                        <p className="text-xs font-bold text-slate-400 tracking-wider mb-2">攔網得分</p>
                        <p className="text-4xl font-black text-indigo-600">{teamBlockStats.stuffs}</p>
                        <p className="text-xs text-slate-400 mt-1">(Stuff Blocks)</p>
                      </div>
                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 text-center">
                        <p className="text-xs font-bold text-slate-400 tracking-wider mb-2">發球失誤率</p>
                        <p className={`text-4xl font-black ${parseFloat(serveErrRate) > 15 ? 'text-rose-600' : parseFloat(serveErrRate) > 8 ? 'text-amber-600' : 'text-emerald-600'}`}>{serveErrRate}<span className="text-lg">%</span></p>
                        <p className="text-xs text-slate-400 mt-1">({teamServeStats.error}/{teamServeStats.total})</p>
                      </div>
                    </div>

                    {/* 每局得分走勢圖 */}
                    {setProgressData.length > 0 && setProgressData.map(spd => (
                      <div key={spd.setNum} className="bg-white rounded-xl border border-slate-200 shadow-sm">
                        <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
                          <h3 className="text-sm font-bold text-slate-700">第{spd.setNum}局 得分進程</h3>
                          {(() => {
                            const last = spd.points[spd.points.length - 1];
                            return <span className="text-sm font-mono font-bold"><span className="text-emerald-600">{last.us}</span> : <span className="text-rose-500">{last.them}</span></span>;
                          })()}
                        </div>
                        <div className="p-4">
                          <ScoreProgressionChart spd={spd} history={history} />
                        </div>
                      </div>
                    ))}

                    {/* 得失分來源清單 (按局數顯示) */}
                    {perSetSummaries
                      .filter(ps => {
                        if (reportSetFilter === 'all') return true;
                        if (reportSetFilter === 'last') return ps.setNum === totalSets;
                        return ps.setNum === parseInt(reportSetFilter);
                      })
                      .map(ps => (
                        <div key={ps.setNum} className="space-y-4">
                          <div className="flex items-center gap-3">
                            <div className="h-px flex-1 bg-slate-200"></div>
                            <span className="bg-slate-100 text-slate-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-slate-200">第 {ps.setNum} 局 得失分分析</span>
                            <div className="h-px flex-1 bg-slate-200"></div>
                          </div>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* 我方得分來源 */}
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                              <div className="bg-emerald-600 px-5 py-3 flex items-center justify-between">
                                <h3 className="text-white font-bold flex items-center"><Trophy className="w-4 h-4 mr-2" /> 我方得分管道 (Set {ps.setNum})</h3>
                                <span className="text-emerald-100 text-xs font-bold tracking-widest uppercase">{ps.us.total} PTS</span>
                              </div>
                              <table className="w-full text-sm">
                                <tbody>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">攻擊得分 (Attack Kill)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.us.attack}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">發球直接得分 (Ace)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.us.serve}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">攔網得分 (Block Stuff)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.us.block}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">對手發球失誤 (Opp Serve Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.us.oppServeError}</td>
                                  </tr>
                                  <tr>
                                    <td className="py-3 px-5 text-slate-600 font-medium">對手失誤 (Opp General Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.us.oppError}</td>
                                  </tr>
                                  <tr className="bg-emerald-50 border-t-2 border-emerald-100">
                                    <td className="py-3 px-5 text-emerald-800 font-black">單局得分總計</td>
                                    <td className="py-3 px-5 text-right font-black text-emerald-700 text-lg">{ps.us.total}</td>
                                  </tr>
                                </tbody>
                              </table>
                            </div>

                            {/* 我方失分來源 */}
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                              <div className="bg-rose-600 px-5 py-3 flex items-center justify-between">
                                <h3 className="text-white font-bold flex items-center"><XCircle className="w-4 h-4 mr-2" /> 我方失分來源 (Set {ps.setNum})</h3>
                                <span className="text-rose-100 text-xs font-bold tracking-widest uppercase">{ps.them.total} PTS</span>
                              </div>
                              <table className="w-full text-sm">
                                <tbody>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">攻擊失誤 (Attack Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.attackError}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">攻擊被攔死 (Blocked)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.attackBlocked}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">發球失誤 (Serve Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.serveError}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">接發球失誤 (Recv Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.receiveError}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">攔網觸網/越位/出界</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.blockError}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                    <td className="py-3 px-5 text-slate-600 font-medium">防守失誤/落地 (Def Err)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.defenseError}</td>
                                  </tr>
                                  <tr>
                                    <td className="py-3 px-5 text-slate-600 font-medium">對手攻擊得分 (Opp Kill)</td>
                                    <td className="py-3 px-5 text-right font-black text-slate-800">{ps.them.oppKill}</td>
                                  </tr>
                                  <tr className="bg-rose-50 border-t-2 border-rose-100">
                                    <td className="py-3 px-5 text-rose-800 font-black">單局失分總計</td>
                                    <td className="py-3 px-5 text-right font-black text-rose-700 text-lg">{ps.them.total}</td>
                                  </tr>
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  );
              })()}

              {reportTab === 'process' && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in">
                  <div className="bg-slate-800 px-6 py-4 flex items-center justify-between">
                    <h2 className="text-white font-bold text-lg flex items-center"><Activity className="w-5 h-5 mr-2 text-blue-400" /> 逐球高階覆盤 (Play-by-play)</h2>
                    <span className="text-slate-400 text-sm">共記錄 {(matchState.history || []).length} 個得分回合</span>
                  </div>
                  <div className="p-6 space-y-6">
                    {processedHistory.length === 0 ? <p className="text-center text-slate-400 py-10">尚無回合數據</p> : (
                      processedHistory.map((rally, rIdx) => (
                        <div key={rIdx} className={`border rounded-xl p-4 hover:shadow-md transition ${rally.winner === 'us' ? 'bg-emerald-50/50 border-emerald-200' : 'bg-rose-50/50 border-rose-200'}`}>
                          <div className="flex justify-between items-center mb-3 pb-3 border-b border-slate-100/50">
                            <div className="flex items-center">
                              <span className="bg-white text-slate-600 font-mono font-bold px-3 py-1 rounded-lg text-sm mr-3 shadow-sm border border-slate-200">Set {rally.setNum}</span>
                              <span className={`font-mono font-black text-xl tracking-wider ${rally.winner === 'us' ? 'text-emerald-600' : 'text-rose-600'}`}>{rally.scoreUs} : {rally.scoreThem}</span>
                              <span className={`ml-3 text-sm font-bold ${rally.winner === 'us' ? 'text-emerald-600' : 'text-rose-600'}`}>{rally.winner === 'us' ? '✓ 我方得分' : '✗ 對手得分'}</span>
                            </div>
                            <div className="text-xs text-slate-500 bg-white/80 p-2 rounded-lg border border-slate-200/50 shadow-sm">
                              <span className="font-bold text-slate-700 mr-2">該分起手站位:</span>
                              P4: #{rally.starters?.p4?.number || '?'} | P3: #{rally.starters?.p3?.number || '?'} | P2: #{rally.starters?.p2?.number || '?'} <br />
                              P5: #{rally.starters?.p5?.number || '?'} | P6: #{rally.starters?.p6?.number || '?'} | P1: #{rally.starters?.p1?.number || '?'}
                            </div>
                          </div>
                          <div className="flex flex-wrap gap-2 items-center">
                            {(rally.actions || []).map((act, aIdx) => (
                              <React.Fragment key={act.id}>
                                <div className="bg-white border border-slate-200 rounded-lg px-3 py-1.5 flex items-center text-sm shadow-sm">
                                  <span className="font-bold text-slate-700 mr-2">{act.player?.name || '未知'}</span>
                                  <span className="text-blue-600 mr-2 font-medium">{getActionCategoryLabel(act.actionCategory)}</span>
                                  <span className={`text-xs px-1.5 py-0.5 rounded font-bold ${act.result?.point === 'us' || act.result?.id === 'kill' ? 'bg-emerald-100 text-emerald-700' : act.result?.point === 'them' ? 'bg-rose-100 text-rose-700' : 'bg-slate-200 text-slate-700'}`}>{act.result?.label || '無資料'}</span>
                                </div>
                                {aIdx < (rally.actions || []).length - 1 && <ArrowRight className="w-4 h-4 text-slate-400" />}
                              </React.Fragment>
                            ))}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              )}

              {reportTab === 'receive' && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in">
                  <div className="bg-slate-800 px-6 py-4 flex items-center justify-between">
                    <h2 className="text-white font-bold text-lg flex items-center"><Target className="w-5 h-5 mr-2 text-emerald-400" /> 接發球高階數據 (Receive Stats)</h2>
                  </div>
                  <div className="p-6">
                    {receiveArray.length === 0 ? <p className="text-center text-slate-400 py-10">尚無接發球數據</p> : (
                      <div>
                        {/* 各球員接發球結果分佈橫向長條圖 */}
                        <div className="mb-8">
                          <h3 className="text-sm font-bold text-slate-500 mb-4 tracking-wider">各球員接發球結果分佈</h3>
                          <div className="space-y-4">
                            {receiveArray.map(p => {
                              const perfectPct = p.total > 0 ? (p.perfect / p.total * 100) : 0;
                              const goodPct = p.total > 0 ? (p.good / p.total * 100) : 0;
                              const badPct = p.total > 0 ? (p.bad / p.total * 100) : 0;
                              const errorPct = p.total > 0 ? (p.error / p.total * 100) : 0;
                              return (
                                <div key={p.name} className="flex items-center gap-3">
                                  <span className="text-sm font-bold text-slate-700 w-28 shrink-0 truncate">#{p.number} {p.name}</span>
                                  <div className="flex-1 h-8 bg-slate-100 rounded-lg overflow-hidden flex relative" title={`到位: ${p.perfect} 顆 | 半到位: ${p.good} 顆 | 不到位: ${p.bad} 顆 | 失誤: ${p.error} 顆`}>
                                    {perfectPct > 0 && <div className="h-full flex items-center justify-center text-slate-700 text-[10px] font-bold border-r border-white/20 transition-all" style={{ width: perfectPct + '%', backgroundColor: 'rgba(22,163,74,0.45)' }}>{perfectPct >= 8 ? perfectPct.toFixed(0) + '%' : ''}</div>}
                                    {goodPct > 0 && <div className="h-full flex items-center justify-center text-slate-700 text-[10px] font-bold border-r border-white/20 transition-all" style={{ width: goodPct + '%', backgroundColor: 'rgba(59,130,246,0.3)' }}>{goodPct >= 8 ? goodPct.toFixed(0) + '%' : ''}</div>}

                                  <td className="py-3 px-4 text-center text-sm"><span className="text-slate-400 mr-1">{p.totalAttacks > 0 ? (p.OH / p.totalAttacks * 100).toFixed(0) : 0}%</span> <span className="font-bold text-slate-600">({p.OH})</span></td>
                                  <td className="py-3 px-4 text-center text-sm"><span className="text-slate-400 mr-1">{p.totalAttacks > 0 ? (p.MB / p.totalAttacks * 100).toFixed(0) : 0}%</span> <span className="font-bold text-slate-600">({p.MB})</span></td>
                                  <td className="py-3 px-4 text-center text-sm"><span className="text-slate-400 mr-1">{p.totalAttacks > 0 ? (p.OPP / p.totalAttacks * 100).toFixed(0) : 0}%</span> <span className="font-bold text-slate-600">({p.OPP})</span></td>
                                  <td className="py-3 px-4 text-center text-sm"><span className="text-slate-400 mr-1">{p.totalAttacks > 0 ? (p.BackRow / p.totalAttacks * 100).toFixed(0) : 0}%</span> <span className="font-bold text-slate-600">({p.BackRow})</span></td>
                                  <td className="py-3 px-4 text-center text-sm"><span className="text-slate-400 mr-1">{p.totalAttacks > 0 ? (p.Setter / p.totalAttacks * 100).toFixed(0) : 0}%</span> <span className="font-bold text-slate-600">({p.Setter})</span></td>
                                </tr>
                              ))}
                              <tr className="bg-slate-50 border-t-2 border-slate-200 font-bold">
                                <td className="py-3 px-4">團隊佔比</td>
                                <td className="py-3 px-4 text-center text-blue-700 bg-blue-100/30">{teamSetDist.totalAttacks}</td>
                                <td className="py-3 px-4 text-center"><span className="text-slate-500 mr-1">{teamSetDist.totalAttacks > 0 ? (teamSetDist.OH / teamSetDist.totalAttacks * 100).toFixed(0) : 0}%</span></td>
                                <td className="py-3 px-4 text-center"><span className="text-slate-500 mr-1">{teamSetDist.totalAttacks > 0 ? (teamSetDist.MB / teamSetDist.totalAttacks * 100).toFixed(0) : 0}%</span></td>
                                <td className="py-3 px-4 text-center"><span className="text-slate-500 mr-1">{teamSetDist.totalAttacks > 0 ? (teamSetDist.OPP / teamSetDist.totalAttacks * 100).toFixed(0) : 0}%</span></td>
                                <td className="py-3 px-4 text-center"><span className="text-slate-500 mr-1">{teamSetDist.totalAttacks > 0 ? (teamSetDist.BackRow / teamSetDist.totalAttacks * 100).toFixed(0) : 0}%</span></td>
                                <td className="py-3 px-4 text-center"><span className="text-slate-500 mr-1">{teamSetDist.totalAttacks > 0 ? (teamSetDist.Setter / teamSetDist.totalAttacks * 100).toFixed(0) : 0}%</span></td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans selection:bg-blue-200 overflow-hidden">
          {currentView === 'dashboard' && renderDashboard()}
          {currentView === 'setup' && renderMatchSetup()}
          {currentView === 'next_set_setup' && renderNextSetSetup()}
          {currentView === 'match' && renderMatchRecorder()}
          {currentView === 'report' && renderMatchReport()}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
